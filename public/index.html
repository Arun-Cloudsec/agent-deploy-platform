  wrap.innerHTML = ''
    + '<div class="modal">'
    +   '<button class="modal-close" id="deploy-close">×</button>'
    +   '<h2>Deploy ' + escapeHtml(m.agent.name) + '</h2>'
    +   '<p class="modal-sub">' + escapeHtml(m.agent.description) + '</p>'
    +   (m.step === 'cloud' ? cloudPickerHtml(m.agent) : '')
    +   (m.step === 'region' ? regionPickerHtml(m.agent) : '')
    +   '<div class="modal-footer">'
    +     (m.step === 'region' ? '<button class="modal-back" id="back-btn">← Back</button>' : '')
    +     (m.step === 'cloud' ? '<button class="modal-deploy" id="next-btn" ' + (m.selectedCloud?'':'disabled') + '>Continue →</button>' : '')
    +     (m.step === 'region' ? '<button class="modal-deploy" id="deploy-now-btn" ' + (m.selectedRegion?'':'disabled') + '>Deploy now →</button>' : '')
    +   '</div>'
    + '</div>';

  document.getElementById('deploy-close').addEventListener('click', closeDeployModal);

  if (m.step === 'cloud') {
    document.querySelectorAll('.target-card').forEach(function(c) {
      c.addEventListener('click', function() {
        if (c.classList.contains('disabled')) return;
        m.selectedCloud = c.dataset.cloud;
        m.selectedRegion = null;
        renderDeployModal();
      });
    });
    var nextBtn = document.getElementById('next-btn');
    if (nextBtn) nextBtn.addEventListener('click', function() { m.step = 'region'; renderDeployModal(); });
  }
  if (m.step === 'region') {
    document.querySelectorAll('.region-card').forEach(function(c) {
      c.addEventListener('click', function() { m.selectedRegion = c.dataset.region; renderDeployModal(); });
    });
    document.getElementById('back-btn').addEventListener('click', function() { m.step = 'cloud'; renderDeployModal(); });
    document.getElementById('deploy-now-btn').addEventListener('click', deployNow);
  }
}

function cloudPickerHtml(agent) {
  var m = deployModal;
  var availableClouds = new Set((agent.availableRegionDetails||[]).map(function(r){return r.cloud;}));
  var clouds = [
    { id:'azure', name:'Microsoft Azure', desc:'Container Apps · 2 regions · ~$120/mo foundation', enabled: availableClouds.has('azure') },
    { id:'aws',   name:'Amazon Web Services', desc:'App Runner · 2 regions · ~$35/mo foundation', enabled: availableClouds.has('aws') },
    { id:'gcp',   name:'Google Cloud', desc:'Coming soon', enabled: false },
    { id:'onprem', name:'On-premises', desc:'Coming soon', enabled: false }
  ];
  return ''
    + '<div class="modal-step-label">Step 1 of 2 · Pick a cloud</div>'
    + '<div class="target-grid">'
    +   clouds.map(function(c) {
        return '<button class="target-card ' + (m.selectedCloud===c.id?'selected':'') + ' ' + (c.enabled?'':'disabled') + '"'
          + ' data-cloud="' + c.id + '" ' + (c.enabled?'':'disabled') + '>'
          + '<div class="target-name">' + c.name + '</div>'
          + '<div class="target-desc">' + c.desc + '</div>'
          + '</button>';
      }).join('')
    + '</div>';
}

function regionPickerHtml(agent) {
  var m = deployModal;
  var regions = (agent.availableRegionDetails||[]).filter(function(r){return r.cloud === m.selectedCloud;});
  if (regions.length === 0) {
    return '<div class="modal-step-label">Step 2 of 2 · Pick a region</div>'
      + '<p style="color: var(--text-1); text-align: center; padding: 40px 0;">'
      + 'No regions configured for this agent in ' + escapeHtml(m.selectedCloud) + '.</p>';
  }
  return ''
    + '<div class="modal-step-label">Step 2 of 2 · Pick a region</div>'
    + '<div class="region-list">'
    +   regions.map(function(r) {
        return '<button class="region-card ' + (m.selectedRegion===r.id?'selected':'') + '" data-region="' + r.id + '">'
          + '<div class="region-flag">' + r.flag + '</div>'
          + '<div class="region-info">'
          + '<div class="region-name">' + escapeHtml(r.shortName) + '</div>'
          + '<div class="region-desc">' + escapeHtml(r.description) + '</div>'
          + '</div>'
          + '<div class="region-radio"></div>'
          + '</button>';
      }).join('')
    + '</div>';
}

async function deployNow() {
  var m = deployModal;
  var a = m.agent;
  var region = m.selectedRegion;
  closeDeployModal();
  try {
    var res = await api('/api/agents/' + a.id + '/deploy', {
      method: 'POST',
      body: JSON.stringify({ regionId: region, deploymentModel: 'dedicated' })
    });
    openProgressModal(a, res.region, res.deploymentId);
  } catch (err) {
    showToast('Deploy failed: ' + err.message);
  }
}

// ─── Progress modal (in-place updates from v5.2) ──────────────────────────────

function progressShellHtml(agent, region) {

    + '<div class="modal progress-modal">'
    +   '<button class="modal-close" id="progress-close" data-enabled="false" style="opacity:0.4">×</button>'

    +       '<div class="progress-meta-item"><span>ETA</span><span class="v eta-ok" id="progress-eta">~4:30</span></div>'

    +                 'stroke-dasharray="326.7" stroke-dashoffset="0"></circle>'

    +       '<div class="countdown-num" id="countdown-num">'
    +         '<div class="countdown-num-val" id="countdown-num-val">60</div>'
    +         '<div class="countdown-num-unit" id="countdown-num-unit">seconds</div>'
    +       '</div>'
    +     '</div>'

var activeProgress = null;

function openProgressModal(agent, region, deploymentId) {
  closeProgressModal();
  var wrap = document.createElement('div');
  wrap.className = 'modal-bg';
  wrap.id = 'progress-modal-bg';
  wrap.innerHTML = progressShellHtml(agent, region);
  document.body.appendChild(wrap);

  activeProgress = {
    deploymentId: deploymentId, agent: agent, region: region,
    cloud: (region && region.cloud) || 'azure',
    startedAt: Date.now(),
    pollHandle: null, timerHandle: null, phaseHandle: null,
    closed: false, lastSeenLogTs: 0, resultRendered: false,
    pendingResult: null,
    phaseIdx: -1,
    phaseSecondsLeft: 0,
    finalData: null,
    dom: {
      bg: wrap,
      stepCells: Array.from(wrap.querySelectorAll('.step-cell')),
      countdownCard: wrap.querySelector('#countdown-card'),
      countdownNum: wrap.querySelector('#countdown-num'),
      countdownNumVal: wrap.querySelector('#countdown-num-val'),
      countdownFill: wrap.querySelector('#countdown-fill'),
      phaseName: wrap.querySelector('#countdown-name'),
      phaseMsg: wrap.querySelector('#countdown-msg'),
      feed: wrap.querySelector('#activity-feed'),
      resultSlot: wrap.querySelector('#progress-result-slot'),
      closeBtn: wrap.querySelector('#progress-close'),
      subtitle: wrap.querySelector('#progress-subtitle'),
      elapsed: wrap.querySelector('#progress-elapsed'),
      eta: wrap.querySelector('#progress-eta')
    }
  };

  // Wire close button (only enabled after timeline finishes)
  activeProgress.dom.closeBtn.addEventListener('click', function() {
    if (activeProgress && activeProgress.dom.closeBtn.dataset.enabled === 'true') closeProgressModal();
  });
  wrap.addEventListener('click', function(e) {
    if (e.target === wrap && activeProgress && activeProgress.dom.closeBtn.dataset.enabled === 'true') closeProgressModal();
  });

  // Start the elapsed/ETA ticker (UI only — the phase ticker drives the timeline)
  activeProgress.timerHandle = setInterval(updateClockStrip, 1000);

  // Kick off the timeline AND the backend poll. Backend poll captures URL/logs
  // but no longer drives the visible phase progression.
  enterPhase(0);
  pollBackend();
}

function closeProgressModal() {
  if (activeProgress) {
    activeProgress.closed = true;
    if (activeProgress.pollHandle) clearTimeout(activeProgress.pollHandle);
    if (activeProgress.timerHandle) clearInterval(activeProgress.timerHandle);
    if (activeProgress.phaseHandle) clearInterval(activeProgress.phaseHandle);
  }
  activeProgress = null;
  var el = document.getElementById('progress-modal-bg');
  if (el) el.remove();
  api('/api/deployments').then(function(r) {
    state.deployments = r.deployments;
    if (state.user) render();
  }).catch(function(){});
}

// ─── Phase ticker — drives the visible countdown ─────────────────────────────

function enterPhase(idx) {
  if (!activeProgress) return;
  var ap = activeProgress;
  if (idx >= TIMELINE_PHASES.length) {
    finishTimeline();
    return;
  }

  var phase = TIMELINE_PHASES[idx];
  ap.phaseIdx = idx;
  ap.phaseSecondsLeft = phase.duration;
  ap.phaseLogIdx = 0;   // next scheduled log entry to emit

  // Update step indicators
  ap.dom.stepCells.forEach(function(c, ci) {
    c.classList.toggle('is-done', ci < idx);
    c.classList.toggle('is-active', ci === idx);
  });

  // Update colors on the countdown card
  ap.dom.countdownCard.style.setProperty('--phase-color', phase.color);
  ap.dom.countdownCard.style.setProperty('--phase-glow', phase.soft);
  ap.dom.countdownFill.style.stroke = phase.color;

  // Reset SVG ring to full
  ap.dom.countdownFill.style.transition = 'none';
  ap.dom.countdownFill.style.strokeDashoffset = '0';
  // Force reflow so the next transition takes effect
  void ap.dom.countdownFill.getBoundingClientRect();
  ap.dom.countdownFill.style.transition = 'stroke-dashoffset 1s linear, stroke 0.6s ease';

  // Update label text with fade
  var phaseName = ap.dom.phaseName;
  var phaseMsg = ap.dom.phaseMsg;
  phaseName.classList.remove('countdown-fade-in');
  phaseMsg.classList.remove('countdown-fade-in');
  void phaseName.offsetWidth;
  phaseName.textContent = phase.name;
  phaseMsg.textContent = phaseMsgFor(phase, ap.cloud);
  phaseName.classList.add('countdown-fade-in');
  phaseMsg.classList.add('countdown-fade-in');

  renderCountdownNumber();

  // Phase header line in the activity feed
  appendLogLine('▸ ' + phase.label.toUpperCase() + ' — ' + phase.name, 'info');

  // Emit any logs scheduled at second 0 (or 1) of this phase right away
  emitScheduledPhaseLogs();

  // Tick every second
  if (ap.phaseHandle) clearInterval(ap.phaseHandle);
  ap.phaseHandle = setInterval(tickPhase, 1000);
}

// Cloud-aware accessors — phases default to Azure copy/logs but can opt into
// AWS-specific variants by declaring `awsMsg` and `awsLogs`.
function phaseMsgFor(phase, cloud) {
  if (cloud === 'aws' && phase.awsMsg) return phase.awsMsg;
  return phase.msg;
}
function phaseLogsFor(phase, cloud) {
  if (cloud === 'aws' && phase.awsLogs) return phase.awsLogs;
  return phase.logs;
}

// Emit scheduled phase logs whose mark has been reached.
function emitScheduledPhaseLogs() {
  if (!activeProgress) return;
  var ap = activeProgress;
  var phase = TIMELINE_PHASES[ap.phaseIdx];
  if (!phase) return;
  var logs = phaseLogsFor(phase, ap.cloud);
  if (!logs) return;
  var secondsInto = phase.duration - ap.phaseSecondsLeft;
  while (ap.phaseLogIdx < logs.length && logs[ap.phaseLogIdx][0] <= secondsInto) {
    var entry = logs[ap.phaseLogIdx];
    appendLogLine(entry[1], entry[2] || 'info');
    ap.phaseLogIdx++;
  }
}

function tickPhase() {
  if (!activeProgress) return;
  var ap = activeProgress;
  ap.phaseSecondsLeft--;
  renderCountdownNumber();
  emitScheduledPhaseLogs();
  if (ap.phaseSecondsLeft <= 0) {
    if (ap.phaseHandle) { clearInterval(ap.phaseHandle); ap.phaseHandle = null; }
    // Mark this step as done before advancing
    if (ap.dom.stepCells[ap.phaseIdx]) {
      ap.dom.stepCells[ap.phaseIdx].classList.remove('is-active');
      ap.dom.stepCells[ap.phaseIdx].classList.add('is-done');
    }
    enterPhase(ap.phaseIdx + 1);
  }
}

function renderCountdownNumber() {
  if (!activeProgress) return;
  var ap = activeProgress;
  var phase = TIMELINE_PHASES[ap.phaseIdx];
  if (!phase) return;
  var left = Math.max(0, ap.phaseSecondsLeft);
  ap.dom.countdownNumVal.textContent = left;
  ap.dom.countdownNum.classList.toggle('urgent', left <= 5);

  // SVG ring depletion: dashoffset goes from 0 → circumference as time passes
  var circumference = 326.7;  // 2π × 52
  var fraction = (phase.duration - left) / phase.duration;
  ap.dom.countdownFill.style.strokeDashoffset = (circumference * fraction).toFixed(1);
}

function updateClockStrip() {
  if (!activeProgress) return;
  var ap = activeProgress;
  var elapsedSec = Math.floor((Date.now() - ap.startedAt) / 1000);
  ap.dom.elapsed.textContent = fmtDuration(elapsedSec);
  if (ap.resultRendered) return;
  var totalDuration = TIMELINE_PHASES.reduce(function(s, p) { return s + p.duration; }, 0);
  var remaining = Math.max(0, totalDuration - elapsedSec);
  ap.dom.eta.textContent = '~' + fmtDuration(remaining);
  ap.dom.eta.classList.toggle('eta-warn', remaining === 0);
  ap.dom.eta.classList.toggle('eta-ok', remaining > 0);
}

// ─── Backend poll — captures logs + final URL but doesn't drive UI ──────────

async function pollBackend() {
  if (!activeProgress || activeProgress.closed) return;
  var ap = activeProgress;
  try {
    var data = await api('/api/deployments/' + ap.deploymentId + '/status');
    ap.finalData = data;
    // NB: We deliberately don't stream backend logs into the activity feed —
    // the feed is now driven by the client-side phase logs so it stays in sync
    // with the visible countdown. Backend logs are still useful for failure
    // detection (below) and for the eventual URL surfacing.
    // Hard failure on the backend → end timeline immediately with error
    if (data.stage === 'failed') {
      abortTimelineWithFailure(data);
      return;
    }
    // Keep polling until backend says done; we just need the URL when it lands
    if (!data.done) ap.pollHandle = setTimeout(pollBackend, 3000);
  } catch (err) {
    // Don't surface poll errors in the feed either — they confuse the timeline
    ap.pollHandle = setTimeout(pollBackend, 5000);
  }
}

function abortTimelineWithFailure(data) {
  if (!activeProgress) return;
  var ap = activeProgress;
  if (ap.phaseHandle) { clearInterval(ap.phaseHandle); ap.phaseHandle = null; }
  ap.finalData = data;
  finishTimeline();
}

function finishTimeline() {
  if (!activeProgress) return;
  var ap = activeProgress;
  if (ap.resultRendered) return;
  ap.resultRendered = true;
  if (ap.timerHandle) { clearInterval(ap.timerHandle); ap.timerHandle = null; }
  if (ap.phaseHandle) { clearInterval(ap.phaseHandle); ap.phaseHandle = null; }

  // Mark all steps done
  ap.dom.stepCells.forEach(function(c) {
    c.classList.remove('is-active');
    c.classList.add('is-done');
  });

  var data = ap.finalData || {};
  // If backend hasn't finished yet, peek at whatever we have. The 8-min server
  // verify timeout means it should usually have a URL by now.
  renderProgressResult(data);
  ap.dom.subtitle.textContent = data.stage === 'failed'
    ? 'Deployment failed'
    : (data.fqdnReal ? '✓ Your agent is live' : 'Timeline complete — verification still in progress');

  // Hide the countdown card, the result card replaces it
  ap.dom.countdownCard.style.display = 'none';

  ap.dom.closeBtn.dataset.enabled = 'true';
  ap.dom.closeBtn.style.opacity = '1';

  if (data.fqdnReal) {
    burstConfetti();
    playCompletionAudio(ap.region);
  }
}

// Auto-play a 3-second "your agent is live in {region}" voice clip when the
// deploy verifies. User preference (mute toggle) lives in localStorage.
// Falls back silently if ElevenLabs isn't configured server-side.
function playCompletionAudio(region) {
  try {
    if (localStorage.getItem('agentos-completion-sound') === 'off') return;
  } catch (e) {}
  if (!region || !region.id) return;
  var lang = localStorage.getItem('voice-tour-lang') || 'en';
  var url = '/api/voiceover/completion?region=' + encodeURIComponent(region.id) + '&lang=' + encodeURIComponent(lang);
  var audio = new Audio(url);
  audio.volume = 0.85;
  audio.play().catch(function() { /* autoplay blocked or audio not configured — fail silent */ });
}

function appendLogLine(msg, level, ts) {
  if (!activeProgress) return;
  var ts2 = ts || Date.now();
  var div = document.createElement('div');
  div.className = 'activity-line ' + (level || '');
  div.innerHTML = '<span class="log-ts">' + new Date(ts2).toLocaleTimeString() + '</span>' + escapeHtml(msg);
  var feed = activeProgress.dom.feed;
  var wasAtBottom = feed.scrollHeight - feed.scrollTop - feed.clientHeight < 30;
  feed.appendChild(div);
  if (wasAtBottom) feed.scrollTop = feed.scrollHeight;
}

function fmtDuration(seconds) {
  if (!seconds || seconds < 0) seconds = 0;
  var m = Math.floor(seconds / 60);
  var s = Math.floor(seconds % 60);
  return m + ':' + (s < 10 ? '0' : '') + s;
}

function burstConfetti() {
  if (!activeProgress) return;
  var bg = activeProgress.dom.bg;
  var layer = document.createElement('div');
  layer.className = 'confetti-layer';
  bg.appendChild(layer);
  var colors = ['#f59e0b', '#ef4444', '#ec4899', '#8b5cf6', '#06b6d4', '#10b981'];
  for (var i = 0; i < 60; i++) {
    var p = document.createElement('div');
    p.className = 'confetti-piece';
    p.style.left = Math.random() * 100 + '%';
    p.style.background = colors[i % colors.length];
    p.style.animationDuration = (1.6 + Math.random() * 1.6) + 's';
    p.style.animationDelay = (Math.random() * 0.3) + 's';
    p.style.transform = 'rotate(' + (Math.random() * 360) + 'deg)';
    layer.appendChild(p);
  }
  setTimeout(function() { if (layer.parentNode) layer.remove(); }, 4000);
}

function renderProgressResult(data) {
  if (!activeProgress) return;
  var ap = activeProgress;
  var slot = ap.dom.resultSlot;
  var isReal = !!ap.agent.cicdProvider;
  var kind, headline, note;
  if (data.stage === 'failed') {
    kind = 'error';
    headline = '<div class="result-mark">!</div> Deployment failed';
    note = 'Something went wrong. Check the activity log above for details.';
  } else if (data.fqdnReal) {
    kind = 'success-shine';
    headline = '<div class="result-mark">✓</div> Your agent is live';
    note = 'Verified deployment to ' + ap.region.flag + ' ' + escapeHtml(ap.region.shortName) + '. Click Open to try it.';
  } else if (isReal) {
    kind = 'warning';
    headline = '<div class="result-mark">!</div> Almost there';
    note = 'The deployment timeline finished but the URL hasn\'t responded yet. Give it another minute, then click below.';
  } else {
    kind = 'warning';
    headline = '<div class="result-mark">·</div> Demo deployment';
    note = 'This agent does not have a CI/CD pipeline yet. The URL is illustrative only.';
  }
  slot.innerHTML = ''
    + '<div class="result-card ' + (kind === 'success-shine' ? 'success-shine' : kind) + '">'
    +   '<div class="result-headline">' + headline + '</div>'
    +   '<div class="result-note">' + note + '</div>'
    +   (data.fqdn ? (
          '<div class="url-box">'
        +   '<div class="url-input">https://' + escapeHtml(data.fqdn) + '</div>'
        +   '<button class="copy-btn" id="copy-btn">Copy</button>'
        +   '<a class="open-btn" href="https://' + escapeAttr(data.fqdn) + '" target="_blank" rel="noopener">Open ↗</a>'
        + '</div>'
        ) : '')
    +   (data.runUrl ? (
          '<a class="result-pipeline-link" href="' + escapeAttr(data.runUrl) + '" target="_blank" rel="noopener">'
        + 'View pipeline run on GitHub →</a>'
        ) : '')
    +   (kind === 'success-shine' ? (
          '<button class="share-receipt-btn" id="share-receipt-btn" data-deploy-id="' + escapeAttr(data.id || '') + '">'
        +   '<span>📤</span> Share receipt'
        + '</button>'
        ) : '')
    + '</div>';
  var copyBtn = document.getElementById('copy-btn');
  if (copyBtn && data.fqdn) {
    copyBtn.addEventListener('click', function() {
      navigator.clipboard.writeText('https://' + data.fqdn);
      copyBtn.textContent = 'Copied';
      copyBtn.classList.add('copied');
      setTimeout(function() { copyBtn.textContent = 'Copy'; copyBtn.classList.remove('copied'); }, 2000);
    });
  }
  var shareBtn = document.getElementById('share-receipt-btn');
  if (shareBtn) {
    shareBtn.addEventListener('click', function() {
      openReceiptModal(shareBtn.dataset.deployId);
    });
  }
}

// ─── Shareable deployment receipt ─────────────────────────────────────────────
// Opens a modal with the SVG receipt rendered, plus three actions:
//   - Download as PNG  (renders SVG → canvas → blob → download)
//   - Copy as image    (renders SVG → canvas → blob → clipboard)
//   - Open SVG         (raw SVG in a new tab)
// All client-side rendering — no extra server deps.

function openReceiptModal(deploymentId) {
  if (!deploymentId) { showToast('Receipt unavailable for this deploy'); return; }
  var existing = document.getElementById('receipt-modal-bg');
  if (existing) existing.remove();

  var wrap = document.createElement('div');
  wrap.className = 'modal-bg';
  wrap.id = 'receipt-modal-bg';
  wrap.innerHTML = ''
    + '<div class="modal receipt-modal">'
    +   '<button class="modal-close" id="receipt-close">×</button>'
    +   '<h2>Share this deploy</h2>'
    +   '<p class="modal-sub">A graphic receipt — drop it into Slack, post it on a channel, or save it for the audit trail.</p>'
    +   '<div class="receipt-preview" id="receipt-preview">'
    +     '<div class="receipt-loading">Rendering receipt…</div>'
    +   '</div>'
    +   '<div class="receipt-actions">'
    +     '<button class="receipt-btn primary" id="receipt-download">⬇ Download PNG</button>'
    +     '<button class="receipt-btn" id="receipt-copy">📋 Copy as image</button>'
    +     '<a class="receipt-btn" id="receipt-svg-link" target="_blank" rel="noopener">↗ Open SVG</a>'
    +   '</div>'
    + '</div>';
  document.body.appendChild(wrap);

  function close() { wrap.remove(); }
  wrap.querySelector('#receipt-close').addEventListener('click', close);
  wrap.addEventListener('click', function(e) { if (e.target === wrap) close(); });

  var svgUrl = '/api/deployments/' + encodeURIComponent(deploymentId) + '/receipt';
  document.getElementById('receipt-svg-link').href = svgUrl;

  // Fetch the SVG, embed it inline so the user can preview before downloading
  fetch(svgUrl, { credentials: 'same-origin' }).then(function(r) {
    if (!r.ok) throw new Error('HTTP ' + r.status);
    return r.text();
  }).then(function(svgText) {
    var preview = document.getElementById('receipt-preview');
    if (!preview) return;
    preview.innerHTML = '';
    // Inject SVG directly so it scales to the container
    preview.insertAdjacentHTML('beforeend', svgText);
    var svgEl = preview.querySelector('svg');
    if (svgEl) {
      svgEl.removeAttribute('width');
      svgEl.removeAttribute('height');
      svgEl.style.width = '100%';
      svgEl.style.height = 'auto';
    }
    // Wire actions now that we have the SVG text
    document.getElementById('receipt-download').addEventListener('click', function() {
      svgToPng(svgText, 1200, 630).then(function(blob) {
        var a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'agentos-deploy-' + deploymentId + '.png';
        a.click();
        setTimeout(function() { URL.revokeObjectURL(a.href); }, 1000);
      }).catch(function(e) { showToast('PNG generation failed: ' + e.message); });
    });
    document.getElementById('receipt-copy').addEventListener('click', async function() {
      try {
        var blob = await svgToPng(svgText, 1200, 630);
        if (navigator.clipboard && window.ClipboardItem) {
          await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
          showToast('Receipt copied to clipboard');
        } else {
          showToast('Clipboard image API not supported in this browser');
        }
      } catch (e) {
        showToast('Copy failed: ' + e.message);
      }
    });
  }).catch(function(e) {
    var preview = document.getElementById('receipt-preview');
    if (preview) preview.innerHTML = '<div class="receipt-loading">Couldn\'t load receipt: ' + escapeHtml(e.message) + '</div>';
  });
}

// Convert SVG text to a PNG blob using a canvas. Returns a Promise<Blob>.
function svgToPng(svgText, w, h) {
  return new Promise(function(resolve, reject) {
    var blob = new Blob([svgText], { type: 'image/svg+xml;charset=utf-8' });
    var url = URL.createObjectURL(blob);
    var img = new Image();
    img.onload = function() {
      var canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      var ctx = canvas.getContext('2d');
      ctx.fillStyle = '#0a1419';
      ctx.fillRect(0, 0, w, h);
      ctx.drawImage(img, 0, 0, w, h);
      URL.revokeObjectURL(url);
      canvas.toBlob(function(b) {
        if (b) resolve(b); else reject(new Error('canvas.toBlob returned null'));
      }, 'image/png');
    };
    img.onerror = function() { URL.revokeObjectURL(url); reject(new Error('SVG failed to load')); };
    img.src = url;
  });
}

function regionDistribDonut(data) {
  if (!data.regions.length) return '';
  var total = data.regions.reduce(function(s,r){return s + r.agentCount;}, 0);
  // Build donut with arcs
  var radius = 40, circ = 2 * Math.PI * radius;
  var offset = 0;
  var palette = ['var(--accent)', 'var(--good)', 'var(--warn)', 'var(--accent-2)'];
  var arcs = data.regions.map(function(r, i) {
    var pct = total ? r.agentCount / total : 0;
    var arc = pct * circ;
    var dasharray = arc + ' ' + circ;
    var svg = '<circle cx="55" cy="55" r="' + radius + '" fill="none" stroke="' + palette[i % palette.length]
      + '" stroke-width="18" stroke-dasharray="' + dasharray + '" stroke-dashoffset="' + (-offset) + '"></circle>';
    offset += arc;
    return svg;
  }).join('');
  return ''
    + '<div class="chart-card">'
    +   '<div class="chart-title">Agents by region</div>'
    +   '<div class="donut-wrap">'
    +     '<svg width="140" height="140" viewBox="0 0 110 110" style="transform: rotate(-90deg);">'
    +       '<circle cx="55" cy="55" r="' + radius + '" fill="none" stroke="var(--bg-1)" stroke-width="18"/>'
    +       arcs
    +     '</svg>'
    +     '<div class="donut-legend">'
    +       data.regions.map(function(r, i) {
              return '<div class="legend-item" style="--legend-color: ' + palette[i % palette.length] + ';">'
                + '<div class="legend-dot"></div>'
                + r.flag + ' ' + escapeHtml(r.shortName)
                + '<div class="legend-spacer"></div>'
                + '<div class="legend-value">' + r.agentCount + '</div>'
                + '</div>';
            }).join('')
    +     '</div>'
    +   '</div>'
    + '</div>';
}

                + '<div class="rm-badge ' + item.phase.toLowerCase() + '">' + escapeHtml(item.phase) + '</div>'
                + '<div class="rm-content">'
                +   '<div class="rm-title">' + escapeHtml(item.title) + '</div>'
                +   '<div class="rm-desc">' + escapeHtml(item.desc) + '</div>'
                + '</div>'
                + '</div>';
            }).join('')
      +   '</div>'
      + '</div>';
  } catch (err) {
    document.getElementById('roi-content').innerHTML = '<div class="empty-state"><h3>Could not load business case</h3><p>' + escapeHtml(err.message) + '</p></div>';
  }
}

// ─── Weekly digest page ──────────────────────────────────────────────────────
// Admin-only. Renders aggregated platform activity over the chosen window
// (7, 14, or 30 days) in an editorial layout that's email-ready — copy the
// rendered region into your mail client to send manually, or wire up the
// /api/digest JSON to your own scheduler.

var digestState = { days: 7 };

async function renderDigest() {
  app.innerHTML = topbarHtml() + '<div class="page-wrapper">'
    + '<div class="page-eyebrow">Activity</div>'
    + '<h1 class="page-title">Weekly digest<br><em>at a glance.</em></h1>'
    + '<p class="page-sub">Platform activity over the chosen window — deploys, regions, top agents, top deployers, and the manual-engineering hours saved. Designed to be copy-pasted into your team\'s weekly update.</p>'
    + '<div class="page-divider"></div>'
    + '<div class="digest-period-toggle" id="digest-toggle">'
    +   '<button class="digest-period-btn ' + (digestState.days === 7 ? 'active' : '') + '" data-days="7">Last 7 days</button>'
    +   '<button class="digest-period-btn ' + (digestState.days === 14 ? 'active' : '') + '" data-days="14">Last 14 days</button>'
    +   '<button class="digest-period-btn ' + (digestState.days === 30 ? 'active' : '') + '" data-days="30">Last 30 days</button>'
    + '</div>'
    + '<div id="digest-content"><div class="empty-state">Loading digest…</div></div>'
    + '</div>';
  wireTopbar();

  document.querySelectorAll('#digest-toggle .digest-period-btn').forEach(function(b) {
    b.addEventListener('click', function() {
      digestState.days = parseInt(b.dataset.days, 10);
      render();
    });
  });

  try {
    var d = await api('/api/digest?days=' + digestState.days);
    var topAgentsHtml = (d.topAgents || []).map(function(a) {
      var pct = (a.count / Math.max(1, d.maxAgentCount)) * 100;
      return '<div class="digest-bar-row">'
        +   '<div class="digest-bar-label">' + escapeHtml(a.name) + '</div>'
        +   '<div class="digest-bar-track"><div class="digest-bar-fill" style="width: ' + pct + '%; --digest-bar-color: ' + escapeAttr(a.color) + ';"></div></div>'
        +   '<div class="digest-bar-val">' + a.count + '</div>'
        + '</div>';
    }).join('');

    var regionsHtml = (d.regionTallies || []).map(function(r) {
      return '<div class="digest-list-row">'
        +   '<div class="agent">' + escapeHtml(r.flag || '') + ' ' + escapeHtml(r.name) + '</div>'
        +   '<div class="meta">' + r.count + ' ' + (r.count === 1 ? 'deploy' : 'deploys') + '</div>'
        +   '<div class="when"></div>'
        + '</div>';
    }).join('');

    var usersHtml = (d.topUsers || []).map(function(u) {
      return '<div class="digest-list-row">'
        +   '<div class="agent">' + escapeHtml(u.name) + '</div>'
        +   '<div class="meta">' + u.count + ' ' + (u.count === 1 ? 'deploy' : 'deploys') + '</div>'
        +   '<div class="when"></div>'
        + '</div>';
    }).join('');

    var latestHtml = (d.latest || []).map(function(x) {
      var when = new Date(x.createdAt).toLocaleString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
      return '<div class="digest-list-row">'
        +   '<div class="agent">' + escapeHtml(x.agentName) + ' <span class="meta">→ ' + escapeHtml(x.regionFlag || '') + ' ' + escapeHtml(x.regionName) + '</span></div>'
        +   '<div class="meta">' + escapeHtml(x.userName || 'admin') + '</div>'
        +   '<div class="when">' + escapeHtml(when) + '</div>'
        + '</div>';
    }).join('');

    var when = new Date(d.period.now).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });

    document.getElementById('digest-content').innerHTML = ''
      + '<div class="digest-card">'
      +   '<div class="digest-eyebrow">AgentOS Digest · ' + escapeHtml(when) + ' · Last ' + d.period.days + ' days</div>'
      +   '<h2 class="serif" style="font-family: \'Source Serif 4\', Georgia, serif; font-size: 32px; font-weight: 500; letter-spacing: -0.02em; margin-bottom: 6px; color: var(--navy);">Here\'s what your team shipped.</h2>'
      +   '<p style="color: var(--text-2); font-size: 14px; margin-bottom: 28px;">' + d.headline.deploys + ' deploys · ' + d.headline.uniqueAgents + ' agents touched · across ' + d.headline.regions + ' ' + (d.headline.regions === 1 ? 'region' : 'regions') + '.</p>'
      +   '<div class="digest-headline-grid">'
      +     '<div class="digest-stat"><div class="digest-stat-num">' + d.headline.deploys + '</div><div class="digest-stat-lbl">Deploys</div></div>'
      +     '<div class="digest-stat"><div class="digest-stat-num">' + d.headline.uniqueAgents + '</div><div class="digest-stat-lbl">Unique agents</div></div>'
      +     '<div class="digest-stat"><div class="digest-stat-num">' + d.headline.regions + '</div><div class="digest-stat-lbl">Regions used</div></div>'
      +     '<div class="digest-stat"><div class="digest-stat-num">' + formatMoney(d.headline.savingsUsd) + '</div><div class="digest-stat-lbl">Vs manual deploy</div></div>'
      +   '</div>'

      +   (topAgentsHtml ? (
            '<div class="digest-section">'
          +   '<h3>Most-deployed agents</h3>'
          +   topAgentsHtml
          + '</div>'
          ) : '')

      +   (regionsHtml ? (
            '<div class="digest-section">'
          +   '<h3>Region activity</h3>'
          +   '<div class="digest-list">' + regionsHtml + '</div>'
          + '</div>'
          ) : '')

      +   (usersHtml ? (
            '<div class="digest-section">'
          +   '<h3>Top deployers</h3>'
          +   '<div class="digest-list">' + usersHtml + '</div>'
          + '</div>'
          ) : '')

      +   (latestHtml ? (
            '<div class="digest-section">'
          +   '<h3>Recent deploys</h3>'
          +   '<div class="digest-list">' + latestHtml + '</div>'
          + '</div>'
          ) : '')

      +   (d.headline.deploys === 0 ? '<div class="empty-state"><p>No deploys in this period yet — try a longer window or push your first deploy from the Catalog.</p></div>' : '')
      + '</div>';
  } catch (err) {
    document.getElementById('digest-content').innerHTML = '<div class="empty-state"><h3>Could not load digest</h3><p>' + escapeHtml(err.message) + '</p></div>';
  }
}

// ─── AgentOS Assistant — AI chat widget ───────────────────────────────────────
//
// Floating bottom-right button that opens a panel where the user can ask about
// agents, regions, costs, compliance, or stuck deploys. Hits POST /api/chat
// on the server, which uses the Anthropic API if ANTHROPIC_API_KEY is set or
// a rule-based fallback otherwise.

var chatState = {
  open: false,
  history: [],   // [{ role: 'user'|'assistant', content: '...' }]
  pending: false
};

var CHAT_SUGGESTIONS_DEFAULT = [
  'What agents are available?',
  'Which regions can I deploy to?',
  'How much does it cost?',
  'How long does a deploy take?'
];

var CHAT_SUGGESTIONS_DEPLOYING = [
  'Why is this taking so long?',
  'What\'s happening behind the scenes?',
  'Can I close this and come back?',
  'Is my data secure?'
];

function ensureChatFab() {
  if (document.getElementById('chat-fab')) return;
  var fab = document.createElement('button');
  fab.id = 'chat-fab';
  fab.className = 'chat-fab';
  fab.setAttribute('aria-label', 'Open AgentOS Assistant');
  fab.innerHTML = '<span class="pulse-ring"></span><span style="position:relative">💬</span>';
  fab.addEventListener('click', toggleChatPanel);
  document.body.appendChild(fab);
}

function removeChatUi() {
  var fab = document.getElementById('chat-fab');
  if (fab) fab.remove();
  var panel = document.getElementById('chat-panel');
  if (panel) panel.remove();
  chatState.open = false;
}

function toggleChatPanel() {
  if (chatState.open) closeChatPanel();
  else openChatPanel();
}

function openChatPanel() {
  if (chatState.open) return;
  chatState.open = true;

  var fab = document.getElementById('chat-fab');
  if (fab) {
    fab.classList.add('is-open');
    fab.innerHTML = '<span style="position:relative;font-size:24px">+</span>';
  }

  var panel = document.createElement('div');
  panel.id = 'chat-panel';
  panel.className = 'chat-panel';
  panel.innerHTML = ''
    + '<div class="chat-panel-header">'
    +   '<div class="chat-avatar">A</div>'
    +   '<div class="chat-title-block">'
    +     '<div class="chat-title">AgentOS Assistant</div>'
    +     '<div class="chat-status-line"><span class="dot"></span>Ready to help</div>'
    +   '</div>'
    +   '<button class="chat-close-btn" id="chat-close-btn" aria-label="Close">×</button>'
    + '</div>'
    + '<div class="chat-body" id="chat-body"></div>'
    + '<div class="chat-suggestions" id="chat-suggestions"></div>'
    + '<div class="chat-input-row">'
    +   '<textarea class="chat-input" id="chat-input" rows="1" placeholder="Ask about agents, regions, costs..."></textarea>'
    +   '<button class="chat-send-btn" id="chat-send-btn">Send</button>'
    + '</div>';
  document.body.appendChild(panel);

  document.getElementById('chat-close-btn').addEventListener('click', closeChatPanel);

  var input = document.getElementById('chat-input');
  input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendChatMessage();
    }
  });
  input.addEventListener('input', function() {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 120) + 'px';
  });
  document.getElementById('chat-send-btn').addEventListener('click', sendChatMessage);

  // Greeting if first time
  if (chatState.history.length === 0) {
    var contextAgent = getChatContextAgent();
    var greeting = contextAgent
      ? 'Hi! I\'m the AgentOS Assistant. I see you\'re looking at ' + contextAgent.name + ' — ask me anything about it, where to deploy, or what it costs.'
      : 'Hi! I\'m the AgentOS Assistant. Ask me about agents, regions, costs, compliance, or how deployments work.';
    chatState.history.push({ role: 'assistant', content: greeting });
  }

  renderChatHistory();
  renderChatSuggestions();
  setTimeout(function() { input.focus(); }, 100);
}

function closeChatPanel() {
  chatState.open = false;
  var panel = document.getElementById('chat-panel');
  if (panel) panel.remove();
  var fab = document.getElementById('chat-fab');
  if (fab) {
    fab.classList.remove('is-open');
    fab.innerHTML = '<span class="pulse-ring"></span><span style="position:relative">💬</span>';
  }
}

function getChatContextAgent() {
  // If the deploy modal or progress modal is open, pin context to that agent
  if (typeof deployModal !== 'undefined' && deployModal && deployModal.agent) return deployModal.agent;
  if (typeof activeProgress !== 'undefined' && activeProgress && activeProgress.agent) return activeProgress.agent;
  return null;
}

function getChatContextRegion() {
  if (typeof deployModal !== 'undefined' && deployModal && deployModal.selectedRegion) {
    return { id: deployModal.selectedRegion };
  }
  if (typeof activeProgress !== 'undefined' && activeProgress && activeProgress.region) {
    return { id: activeProgress.region.id };
  }
  return null;
}

function renderChatHistory() {
  var body = document.getElementById('chat-body');
  if (!body) return;
  body.innerHTML = chatState.history.map(function(m) {
    return '<div class="chat-msg ' + m.role + (m.error ? ' error' : '') + '">'
         +   '<div class="chat-bubble">' + escapeHtml(m.content) + '</div>'
         + '</div>';
  }).join('');
  if (chatState.pending) {
    body.innerHTML += ''
      + '<div class="chat-msg assistant">'
      +   '<div class="chat-bubble"><div class="chat-typing"><span></span><span></span><span></span></div></div>'
      + '</div>';
  }
  body.scrollTop = body.scrollHeight;
}

function renderChatSuggestions() {
  var slot = document.getElementById('chat-suggestions');
  if (!slot) return;
  // Hide suggestions once user is in conversation
  if (chatState.history.filter(function(m) { return m.role === 'user'; }).length >= 1) {
    slot.innerHTML = '';
    return;
  }
  var suggestions = (typeof activeProgress !== 'undefined' && activeProgress && !activeProgress.resultRendered)
    ? CHAT_SUGGESTIONS_DEPLOYING
    : CHAT_SUGGESTIONS_DEFAULT;
  slot.innerHTML = suggestions.map(function(s) {
    return '<button class="chat-chip" data-q="' + escapeAttr(s) + '">' + escapeHtml(s) + '</button>';
  }).join('');
  slot.querySelectorAll('.chat-chip').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var input = document.getElementById('chat-input');
      input.value = btn.dataset.q;
      sendChatMessage();
    });
  });
}

async function sendChatMessage() {
  if (chatState.pending) return;
  var input = document.getElementById('chat-input');
  if (!input) return;
  var text = (input.value || '').trim();
  if (!text) return;

  chatState.history.push({ role: 'user', content: text });
  chatState.pending = true;
  input.value = '';
  input.style.height = 'auto';
  renderChatHistory();
  renderChatSuggestions();

  var ctxAgent = getChatContextAgent();
  var ctxRegion = getChatContextRegion();
  var context = {};
  if (ctxAgent) context.agentId = ctxAgent.id;
  if (ctxRegion) context.regionId = ctxRegion.id;

  try {
    var res = await api('/api/chat', {
      method: 'POST',
      body: JSON.stringify({
        message: text,
        history: chatState.history.slice(0, -1).slice(-12),
        context: context
      })
    });
    chatState.history.push({ role: 'assistant', content: res.reply || '(no reply)' });
  } catch (err) {
    var errMsg = (err && err.message) || 'unknown error';
    var isAuth = /auth required|not authenticated|HTTP 401/i.test(errMsg);
    chatState.history.push({
      role: 'assistant',
      content: isAuth
        ? 'Your session has ended. Please refresh this page and sign in again to keep chatting with the assistant.'
        : 'Sorry — I couldn\'t reach the assistant just now. ' + errMsg,
      error: true
    });
  }
  chatState.pending = false;
  renderChatHistory();
}

async function signOut() {
  try { await api('/api/auth/logout', { method: 'POST' }); } catch (e) {}
  state.user = null;
  state.view = 'login';
  render();
}

(async function boot() {
  try {
    var me = await api('/api/auth/me');
    state.user = me.user;
    await loadCatalog();
    state.view = 'marketplace';
  } catch (e) {
    state.view = 'login';
  }
  render();
})();
</script>
</body>
</html>
