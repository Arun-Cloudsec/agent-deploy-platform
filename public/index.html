<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgentOS — Multi-region AI agent deployment platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Source+Serif+4:ital,wght@0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  /* McKinsey-inspired: pure white, deep navy, elegant serif headlines */
  :root {
    --white: #ffffff;
    --bg-0: #ffffff;
    --bg-1: #f6f6f6;
    --bg-2: #ebebeb;
    --bg-3: #e0e0e0;
    --line: #d6d6d6;
    --line-2: #a8a8a8;

    --navy: #051c2c;
    --navy-2: #034b6f;
    --text-0: #051c2c;
    --text-1: #424b56;
    --text-2: #767676;

    --accent: #2251ff;       /* McKinsey blue */
    --accent-soft: rgba(34, 81, 255, 0.08);
    --accent-2: #034b6f;
    --good: #00a5a8;
    --good-soft: rgba(0, 165, 168, 0.08);
    --warn: #ffa800;
    --warn-soft: rgba(255, 168, 0, 0.10);
    --bad: #e0301e;
    --bad-soft: rgba(224, 48, 30, 0.08);

    --shadow-card: 0 1px 3px rgba(5, 28, 44, 0.06);
    --shadow-card-h: 0 8px 24px rgba(5, 28, 44, 0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--bg-0);
    color: var(--text-0);
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
    font-feature-settings: 'ss01', 'ss03';
  }
  .serif { font-family: 'Source Serif 4', Georgia, serif; }
  .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }

  #app { min-height: 100vh; }

  /* ─── Login ─── */
  .login-page {
    min-height: 100vh;
    display: grid;
    grid-template-columns: 1.1fr 1fr;
  }
  @media (max-width: 900px) {
    .login-page { grid-template-columns: 1fr; }
    .login-page .splash { display: none; }
  }
  .splash {
    background: var(--navy);
    color: white;
    padding: 80px 60px;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    position: relative;
    overflow: hidden;
  }
  .splash::before {
    content: '';
    position: absolute;
    top: -20%; right: -10%;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(34, 81, 255, 0.20) 0%, transparent 60%);
    pointer-events: none;
  }
  .splash-mark {
    width: 56px; height: 56px;
    background: white;
    color: var(--navy);
    border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700;
    font-size: 22px;
    letter-spacing: -0.04em;
    position: relative;
  }
  .splash-headline {
    font-family: 'Source Serif 4', Georgia, serif;
    font-size: 64px;
    font-weight: 400;
    line-height: 1.05;
    letter-spacing: -0.02em;
    margin-bottom: 32px;
    position: relative;
  }
  .splash-headline em {
    font-style: italic;
    color: rgba(255, 255, 255, 0.85);
  }
  .splash-sub {
    font-size: 18px;
    color: rgba(255, 255, 255, 0.72);
    max-width: 520px;
    line-height: 1.6;
    position: relative;
  }
  .splash-foot {
    color: rgba(255, 255, 255, 0.45);
    font-size: 12px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    position: relative;
  }

  .login-card {
    padding: 80px 60px;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    background: white;
  }
  .login-card-inner { width: 100%; max-width: 400px; }
  .login-card h2 {
    font-family: 'Source Serif 4', Georgia, serif;
    font-size: 32px;
    font-weight: 500;
    margin-bottom: 8px;
    letter-spacing: -0.02em;
  }
  .login-card .desc { color: var(--text-1); margin-bottom: 36px; font-size: 15px; }
  .form-row { display: flex; flex-direction: column; gap: 6px; margin-bottom: 20px; }
  .form-row label { font-size: 12px; color: var(--text-2); font-weight: 500; text-transform: uppercase; letter-spacing: 0.04em; }
  .form-row input {
    padding: 12px 14px; background: white; border: 1px solid var(--line); border-radius: 0;
    color: var(--text-0); font: inherit; font-size: 15px;
    transition: border-color 0.15s;
  }
  .form-row input:focus { outline: none; border-color: var(--accent); }
  .btn { border: none; cursor: pointer; font: inherit; transition: all 0.15s; }
  .btn-primary {
    width: 100%;
    padding: 14px 16px;
    border-radius: 0;
    background: var(--navy);
    color: white;
    font-weight: 500;
    font-size: 15px;
    margin-top: 8px;
    letter-spacing: 0.01em;
  }
  .btn-primary:hover { background: var(--accent); }
  .azure-btn {
    width: 100%;
    padding: 12px 16px;
    border-radius: 0;
    background: white;
    border: 1px solid var(--line);
    color: var(--text-0);
    font-weight: 500;
    font-size: 14px;
    margin-top: 12px;
    display: flex; align-items: center; justify-content: center; gap: 10px;
  }
  .azure-btn:hover { border-color: var(--navy); background: var(--bg-1); }
  .demo-hint {
    margin-top: 28px;
    padding: 14px 16px;
    background: var(--bg-1);
    border-left: 2px solid var(--accent);
    font-size: 13px;
    color: var(--text-1);
    line-height: 1.6;
  }
  .demo-hint code { background: white; padding: 2px 6px; font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--navy); }
  .login-error {
    margin-top: 12px; padding: 12px 14px;
    background: var(--bad-soft); color: var(--bad); font-size: 13px;
    border-left: 2px solid var(--bad);
  }

  /* ─── Top nav ─── */
  .topbar {
    position: sticky; top: 0; z-index: 50;
    background: white;
    border-bottom: 1px solid var(--line);
    padding: 0 40px;
    height: 64px;
    display: flex; align-items: center; gap: 32px;
  }
  .topbar-mark {
    width: 36px; height: 36px;
    background: var(--navy);
    color: white;
    border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700;
    font-size: 14px;
    letter-spacing: -0.02em;
    flex-shrink: 0;
  }
  .topbar-name {
    font-weight: 600;
    font-size: 17px;
    letter-spacing: -0.02em;
    color: var(--navy);
  }
  .topbar-name span { font-weight: 400; color: var(--text-2); margin-left: 8px; font-size: 13px; }
  .nav { display: flex; gap: 0; margin-left: 24px; }
  .nav-item {
    padding: 22px 16px;
    color: var(--text-1);
    font-size: 14px;
    cursor: pointer;
    background: transparent;
    border: none;
    border-bottom: 2px solid transparent;
    font: inherit;
    transition: all 0.15s;
    display: flex; align-items: center; gap: 8px;
    margin-bottom: -1px;
  }
  .nav-item:hover { color: var(--navy); }
  .nav-item.active { color: var(--navy); border-bottom-color: var(--accent); font-weight: 500; }
  .nav-badge {
    background: var(--accent); color: white;
    font-size: 11px; font-weight: 600;
    padding: 1px 7px; border-radius: 10px; min-width: 18px; text-align: center;
  }
  .topbar-right { margin-left: auto; display: flex; align-items: center; gap: 16px; }
  .topbar-region { font-size: 12px; color: var(--text-2); padding: 6px 12px; background: var(--bg-1); border-radius: 14px; }
  .topbar-user { display: flex; align-items: center; gap: 10px; }
  .avatar {
    width: 32px; height: 32px; border-radius: 50%;
    background: var(--navy); color: white;
    display: flex; align-items: center; justify-content: center;
    font-weight: 600; font-size: 13px;
  }
  .user-name { font-size: 14px; color: var(--text-0); }
  .signout-link { color: var(--text-2); font-size: 13px; cursor: pointer; }
  .signout-link:hover { color: var(--navy); }

  /* ─── Page header ─── */
  .page-wrapper { max-width: 1400px; margin: 0 auto; padding: 56px 40px 80px; }
  .page-eyebrow {
    color: var(--accent); font-size: 13px;
    text-transform: uppercase; letter-spacing: 0.1em;
    font-weight: 500;
    margin-bottom: 16px;
  }
  .page-title {
    font-family: 'Source Serif 4', Georgia, serif;
    font-size: 56px; font-weight: 400;
    letter-spacing: -0.02em; line-height: 1.05;
    margin-bottom: 20px; max-width: 900px;
    color: var(--navy);
  }
  .page-title em { font-style: italic; color: var(--accent); }
  .page-sub {
    color: var(--text-1);
    font-size: 17px; max-width: 680px; line-height: 1.55;
  }
  .page-divider {
    height: 1px;
    background: var(--line);
    margin: 56px 0 40px;
  }

  /* ─── Voice tour strip (marketplace top) ─── */
  .voice-tour {
    margin-top: 28px;
    padding: 18px 22px;
    background: linear-gradient(135deg, var(--navy) 0%, #1e3a8a 100%);
    border-radius: 12px;
    color: white;
    display: grid;
    grid-template-columns: 44px 1fr auto auto;
    gap: 16px;
    align-items: center;
    position: relative;
    overflow: hidden;
  }
  .voice-tour::before {
    content: ''; position: absolute;
    top: -40%; right: -10%;
    width: 280px; height: 280px;
    background: radial-gradient(circle, rgba(139, 92, 246, 0.25) 0%, transparent 65%);
    pointer-events: none;
  }
  @media (max-width: 720px) {
    .voice-tour { grid-template-columns: 44px 1fr; gap: 12px; padding: 16px; }
    .voice-tour-controls { grid-column: 1 / -1; display: flex; gap: 8px; flex-wrap: wrap; }
  }
  .voice-tour-icon {
    width: 44px; height: 44px;
    border-radius: 50%;
    background: linear-gradient(135deg, #8b5cf6, #06b6d4);
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
    position: relative; z-index: 1;
  }
  .voice-tour-text {
    position: relative; z-index: 1;
    min-width: 0;
  }
  .voice-tour-eyebrow {
    font-size: 10px;
    font-weight: 600;
    color: rgba(255,255,255,0.65);
    text-transform: uppercase;
    letter-spacing: 0.10em;
    margin-bottom: 3px;
  }
  .voice-tour-title {
    font-family: 'Source Serif 4', Georgia, serif;
    font-size: 17px;
    font-weight: 500;
    color: white;
    line-height: 1.3;
    letter-spacing: -0.01em;
  }
  .voice-tour-controls {
    display: flex; gap: 8px; align-items: center;
    position: relative; z-index: 1;
  }
  .voice-lang-select {
    padding: 8px 12px;
    background: rgba(255, 255, 255, 0.10);
    border: 1px solid rgba(255, 255, 255, 0.20);
    color: white;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    cursor: pointer;
    border-radius: 6px;
    outline: none;
  }
  .voice-lang-select option { color: var(--text-0); background: white; }
  .voice-play-btn {
    padding: 9px 18px;
    background: white;
    color: var(--navy);
    border: none;
    border-radius: 6px;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    transition: transform 0.15s, background 0.15s;
  }
  .voice-play-btn:hover { transform: translateY(-1px); background: var(--accent-soft); color: var(--accent); }
  .voice-play-btn:disabled { opacity: 0.7; cursor: wait; transform: none; background: white; color: var(--navy); }
  .voice-play-btn .dots {
    display: inline-flex; gap: 2px;
  }
  .voice-play-btn .dots span {
    width: 4px; height: 4px; border-radius: 50%;
    background: currentColor;
    animation: voice-dot 1.2s infinite;
  }
  .voice-play-btn .dots span:nth-child(2) { animation-delay: 0.15s; }
  .voice-play-btn .dots span:nth-child(3) { animation-delay: 0.30s; }
  @keyframes voice-dot {
    0%, 60%, 100% { opacity: 0.4; }
    30% { opacity: 1; }
  }
  .voice-audio-wrap {
    grid-column: 1 / -1;
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px solid rgba(255, 255, 255, 0.15);
    position: relative; z-index: 1;
  }
  .voice-audio-wrap audio {
    width: 100%; height: 36px;
    border-radius: 6px;
  }
  .voice-tour-error {
    grid-column: 1 / -1;
    margin-top: 12px;
    padding: 10px 12px;
    background: rgba(255, 100, 100, 0.15);
    border-left: 3px solid #ff8a8a;
    font-size: 12.5px;
    color: rgba(255, 255, 255, 0.90);
    line-height: 1.5;
    border-radius: 0 4px 4px 0;
    position: relative; z-index: 1;
  }

  /* ─── Filters ─── */
  .filters { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-bottom: 32px; }
  .search-box {
    flex: 1; min-width: 280px;
    padding: 11px 14px;
    background: white; border: 1px solid var(--line); border-radius: 0;
    color: var(--text-0); font: inherit; font-size: 14px;
  }
  .search-box:focus { outline: none; border-color: var(--accent); }
  .pills { display: flex; gap: 0; flex-wrap: wrap; border: 1px solid var(--line); }
  .pill {
    padding: 8px 16px;
    border: none; border-right: 1px solid var(--line);
    background: white; color: var(--text-1);
    font-size: 13px; cursor: pointer; transition: all 0.15s;
    font: inherit;
  }
  .pill:last-child { border-right: none; }
  .pill:hover { background: var(--bg-1); color: var(--navy); }
  .pill.active { background: var(--navy); color: white; }

  /* ─── Cards (catalog) ─── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 24px;
  }
  .card {
    background: white;
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 28px;
    transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
    animation: card-in 0.4s cubic-bezier(0.16, 1, 0.3, 1) both;
    animation-delay: calc(var(--i) * 25ms);
    min-height: 280px;
    display: flex; flex-direction: column;
    position: relative;
  }
  @keyframes card-in {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .card:hover { box-shadow: var(--shadow-card-h); border-color: var(--line-2); }
  .card-icon { font-size: 32px; line-height: 1; color: var(--card-color); margin-bottom: 16px; }
  .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
  .card-badge {
    font-size: 10px; font-weight: 600; color: var(--card-color);
    text-transform: uppercase; letter-spacing: 0.10em;
  }
  .card-status { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text-2); text-transform: uppercase; letter-spacing: 0.08em; }
  .card-status .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--good); }
  .card-status.coming-soon .dot { background: var(--text-2); }
  .card h3 {
    font-family: 'Source Serif 4', Georgia, serif;
    font-size: 22px; font-weight: 500;
    letter-spacing: -0.01em; margin-bottom: 10px;
    color: var(--navy);
  }
  .card-desc { color: var(--text-1); font-size: 14px; line-height: 1.55; flex: 1; margin-bottom: 16px; }
  .card-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 18px; }
  .card-tag { font-size: 11px; color: var(--text-2); background: var(--bg-1); padding: 3px 8px; }
  .card-actions { display: flex; gap: 8px; }
  .card-cta {
    flex: 1; padding: 10px 14px;
    border-radius: 0; font-size: 13px; font-weight: 500;
    text-align: center; cursor: pointer; transition: all 0.15s;
    border: 1px solid var(--line); background: white; color: var(--text-0);
    text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 6px;
    font: inherit;
  }
  .card-cta:hover { border-color: var(--navy); background: var(--bg-1); }
  .card-cta.primary {
    background: var(--navy); color: white; border-color: var(--navy);
    font-weight: 500;
  }
  .card-cta.primary:hover { background: var(--accent); border-color: var(--accent); }
  .card-cta.disabled { opacity: 0.4; cursor: not-allowed; pointer-events: none; }

  /* ─── Stat cards (dashboard) ─── */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 1px;
    background: var(--line);
    border: 1px solid var(--line);
    margin-bottom: 40px;
  }
  .stat-card {
    background: white;
    padding: 28px 24px;
    display: flex; flex-direction: column; gap: 8px;
  }
  .stat-lbl {
    font-size: 12px; color: var(--text-2);
    text-transform: uppercase; letter-spacing: 0.08em;
    font-weight: 500;
  }
  .stat-val {
    font-family: 'Source Serif 4', Georgia, serif;
    font-size: 44px; font-weight: 500; letter-spacing: -0.03em;
    line-height: 1;
    color: var(--navy);
  }
  .stat-val .unit { font-size: 18px; color: var(--text-2); margin-left: 4px; font-weight: 400; }
  .stat-change { font-size: 12px; color: var(--text-2); display: flex; align-items: center; gap: 4px; }
  .stat-change.up { color: var(--good); }
  .stat-change.down { color: var(--bad); }
  .stat-source { font-size: 10px; color: var(--text-2); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.08em; }

  /* ─── Tables ─── */
  .data-table-wrap { background: white; border: 1px solid var(--line); }
  .table-head {
    padding: 20px 24px;
    border-bottom: 1px solid var(--line);
    display: flex; align-items: center; justify-content: space-between;
  }
  .table-title {
    font-family: 'Source Serif 4', Georgia, serif;
    font-size: 22px; font-weight: 500;
    color: var(--navy); letter-spacing: -0.01em;
  }
  .data-table { width: 100%; border-collapse: collapse; }
  .data-table th {
    text-align: left;
    padding: 14px 24px;
    background: var(--bg-1);
    border-bottom: 1px solid var(--line);
    font-size: 11px;
    color: var(--text-2);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-weight: 600;
  }
  .data-table td {
    padding: 16px 24px;
    border-bottom: 1px solid var(--line);
    font-size: 14px;
    color: var(--text-0);
    vertical-align: middle;
  }
  .data-table tr:last-child td { border-bottom: none; }
  .data-table tr:hover td { background: var(--bg-1); }

  .agent-cell { display: flex; align-items: center; gap: 10px; }
  .agent-cell .icon {
    font-size: 18px; width: 36px; height: 36px;
    background: var(--bg-1); border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
  }
  .region-badge-cell {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 10px;
    background: var(--bg-1);
    font-size: 12px; color: var(--text-1);
  }
  .status-pill {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 10px; font-size: 12px; font-weight: 500;
    background: var(--good-soft); color: var(--good);
  }
  .status-pill.demo { background: var(--warn-soft); color: var(--warn); }
  .status-pill.stopped { background: var(--bg-2); color: var(--text-2); }

  .url-cell { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--text-1); max-width: 320px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .row-actions { display: flex; gap: 6px; }
  .row-btn {
    padding: 6px 12px;
    background: white; border: 1px solid var(--line);
    color: var(--text-0); cursor: pointer;
    font: inherit; font-size: 12px; text-decoration: none;
  }
  .row-btn:hover { border-color: var(--navy); background: var(--bg-1); }
  .row-btn.danger { color: var(--bad); border-color: var(--bad-soft); }
  .row-btn.danger:hover { background: var(--bad-soft); border-color: var(--bad); }

  .empty-state { text-align: center; padding: 80px 32px; color: var(--text-2); }
  .empty-state h3 { font-family: 'Source Serif 4', Georgia, serif; font-size: 22px; color: var(--text-1); margin-bottom: 8px; }

  /* ─── Modal ─── */
  .modal-bg {
    position: fixed; inset: 0;
    background: rgba(5, 28, 44, 0.50);
    z-index: 100;
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
    animation: fade-in 0.2s ease-out;
  }
  @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
  .modal {
    position: relative;
    background: white; border-radius: 0;
    width: 100%; max-width: 600px; max-height: 90vh; overflow-y: auto;
    padding: 40px;
    animation: slide-up 0.25s cubic-bezier(0.16, 1, 0.3, 1);
    box-shadow: 0 32px 80px rgba(5, 28, 44, 0.30);
  }
  @keyframes slide-up { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  .modal-close {
    position: absolute; top: 16px; right: 16px;
    width: 32px; height: 32px;
    background: white; border: 1px solid var(--line);
    color: var(--text-1); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }
  .modal-close:hover { border-color: var(--navy); }
  .modal h2 {
    font-family: 'Source Serif 4', Georgia, serif;
    font-size: 28px; font-weight: 500;
    letter-spacing: -0.02em; margin-bottom: 8px; padding-right: 40px;
    color: var(--navy);
  }
  .modal-sub { color: var(--text-1); margin-bottom: 28px; font-size: 14px; line-height: 1.5; }
  .modal-step-label { font-size: 11px; color: var(--text-2); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 14px; margin-top: 8px; font-weight: 600; }

  .target-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 16px; }
  .target-card {
    padding: 16px;
    border: 1px solid var(--line);
    background: white; cursor: pointer;
    transition: all 0.15s;
    text-align: left; color: var(--text-0); font: inherit;
  }
  .target-card:hover { border-color: var(--navy); background: var(--bg-1); }
  .target-card.selected { border-color: var(--accent); background: var(--accent-soft); }
  .target-card.disabled { opacity: 0.45; cursor: not-allowed; }
  .target-name { font-weight: 600; font-size: 14px; margin-bottom: 4px; color: var(--navy); }
  .target-desc { font-size: 12px; color: var(--text-2); }

  .region-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
  .region-card {
    padding: 16px;
    border: 1px solid var(--line);
    background: white; cursor: pointer;
    transition: all 0.15s;
    display: flex; align-items: center; gap: 14px;
    text-align: left; color: var(--text-0); font: inherit; width: 100%;
  }
  .region-card:hover { border-color: var(--navy); background: var(--bg-1); }
  .region-card.selected { border-color: var(--accent); background: var(--accent-soft); }
  .region-flag { font-size: 28px; line-height: 1; }
  .region-info { flex: 1; }
  .region-name { font-weight: 600; font-size: 14px; margin-bottom: 3px; color: var(--navy); }
  .region-desc { font-size: 12px; color: var(--text-2); }
  .region-radio {
    width: 18px; height: 18px; border-radius: 50%;
    border: 2px solid var(--line-2); flex-shrink: 0;
  }
  .region-card.selected .region-radio {
    border-color: var(--accent); background: var(--accent);
    box-shadow: inset 0 0 0 3px white;
  }

  .modal-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 24px; padding-top: 24px; border-top: 1px solid var(--line); }
  .modal-back {
    padding: 10px 18px;
    background: white; border: 1px solid var(--line);
    color: var(--text-1); cursor: pointer;
    font: inherit; font-size: 14px;
  }
  .modal-back:hover { border-color: var(--navy); color: var(--navy); }
  .modal-deploy {
    padding: 10px 22px;
    background: var(--navy); color: white; border: none;
    font-weight: 500; cursor: pointer;
    font: inherit; font-size: 14px;
  }
  .modal-deploy:hover { background: var(--accent); }
  .modal-deploy:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ─── Progress phases ─── */
  .phases { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0; margin-bottom: 24px; border: 1px solid var(--line); }
  .phase {
    padding: 16px 12px;
    background: white;
    text-align: center;
    border-right: 1px solid var(--line);
    transition: all 0.3s;
  }
  .phase:last-child { border-right: none; }
  .phase.active { background: var(--accent-soft); }
  .phase.done { background: var(--good-soft); }
  .phase-icon {
    width: 22px; height: 22px;
    margin: 0 auto 6px;
    border-radius: 50%;
    border: 2px solid var(--line-2);
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700;
    background: white; color: var(--text-2);
    transition: all 0.3s;
  }
  .phase.active .phase-icon { border-color: var(--accent); color: var(--accent); }
  .phase.done .phase-icon { border-color: var(--good); background: var(--good); color: white; }
  .phase-label { font-size: 11px; color: var(--text-2); text-transform: uppercase; letter-spacing: 0.05em; font-weight: 500; }
  .phase.active .phase-label, .phase.done .phase-label { color: var(--navy); font-weight: 600; }

  .progress-bar-track { height: 3px; background: var(--bg-2); overflow: hidden; margin-bottom: 20px; }
  .progress-bar-fill { height: 100%; background: var(--accent); transition: width 0.5s cubic-bezier(0.16, 1, 0.3, 1); }

  .activity-feed {
    background: var(--navy); color: rgba(255,255,255,0.85);
    padding: 16px;
    height: 200px;
    overflow-y: auto;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    line-height: 1.6;
  }
  .activity-line { color: rgba(255,255,255,0.85); }
  .activity-line.warning { color: var(--warn); }
  .activity-line.error { color: #ff7a6e; }

  .result-card { padding: 24px; background: var(--good-soft); border-left: 3px solid var(--good); margin-top: 20px; }
  .result-card.warning { background: var(--warn-soft); border-color: var(--warn); }
  .result-card.error { background: var(--bad-soft); border-color: var(--bad); }
  .result-headline {
    display: flex; align-items: center; gap: 10px;
    font-family: 'Source Serif 4', Georgia, serif;
    font-size: 19px; font-weight: 500; letter-spacing: -0.01em;
    margin-bottom: 8px; color: var(--navy);
  }
  .result-mark {
    width: 24px; height: 24px; border-radius: 50%;
    background: var(--good); color: white;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 700; flex-shrink: 0;
  }
  .result-card.warning .result-mark { background: var(--warn); }
  .result-card.error .result-mark { background: var(--bad); }
  .result-note { color: var(--text-1); font-size: 14px; margin-bottom: 14px; line-height: 1.55; }
  .url-box { display: flex; gap: 8px; margin-bottom: 8px; }
  .url-input {
    flex: 1; padding: 12px 14px;
    background: white; border: 1px solid var(--line);
    color: var(--text-0); font-family: 'JetBrains Mono', monospace; font-size: 12px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; user-select: all;
  }
  .copy-btn, .open-btn {
    padding: 10px 14px;
    background: white; border: 1px solid var(--line);
    color: var(--text-0); cursor: pointer;
    font: inherit; font-size: 13px; font-weight: 500;
    flex-shrink: 0; text-decoration: none;
    display: flex; align-items: center; gap: 6px;
  }
  .copy-btn:hover, .open-btn:hover { border-color: var(--navy); }
  .copy-btn.copied { background: var(--good); color: white; border-color: var(--good); }
  .result-pipeline-link { display: inline-flex; align-items: center; gap: 6px; color: var(--text-1); text-decoration: none; font-size: 13px; margin-top: 6px; }
  .result-pipeline-link:hover { color: var(--navy); }

  /* ════════════════════════════════════════════════════════════════════════
     v6.8 — Marketing extras: share receipt · sound toggle · digest page
     ════════════════════════════════════════════════════════════════════════ */

  /* Share receipt button — sits inside the success result card */
  .share-receipt-btn {
    margin-top: 14px;
    padding: 10px 16px;
    background: var(--navy);
    color: white;
    border: none;
    cursor: pointer;
    font: inherit;
    font-size: 13px;
    font-weight: 500;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    transition: background 0.15s;
  }
  .share-receipt-btn:hover { background: var(--accent); }

  /* Receipt modal */
  .modal.receipt-modal { max-width: 760px; }
  .receipt-preview {
    margin: 18px 0 22px;
    background: var(--navy);
    border-radius: 10px;
    overflow: hidden;
    aspect-ratio: 1200 / 630;
    display: flex; align-items: center; justify-content: center;
  }
  .receipt-preview svg { display: block; }
  .receipt-loading {
    color: rgba(255,255,255,0.65);
    font-size: 14px;
    font-family: 'JetBrains Mono', monospace;
  }
  .receipt-actions {
    display: flex; gap: 10px;
    flex-wrap: wrap;
    padding-top: 18px;
    border-top: 1px solid var(--line);
  }
  .receipt-btn {
    padding: 10px 16px;
    background: white;
    color: var(--text-0);
    border: 1px solid var(--line);
    cursor: pointer;
    font: inherit;
    font-size: 13px;
    font-weight: 500;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    transition: all 0.15s;
  }
  .receipt-btn:hover { border-color: var(--navy); background: var(--bg-1); }
  .receipt-btn.primary { background: var(--navy); color: white; border-color: var(--navy); }
  .receipt-btn.primary:hover { background: var(--accent); border-color: var(--accent); }

  /* Completion-sound toggle (lives in topbar) */
  .sound-toggle {
    background: none;
    border: 1px solid var(--line);
    color: var(--text-1);
    padding: 6px 10px;
    font: inherit;
    font-size: 12px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 5px;
    transition: all 0.15s;
    border-radius: 4px;
  }
  .sound-toggle:hover { border-color: var(--navy); color: var(--navy); }
  .sound-toggle.is-off { opacity: 0.55; }

  /* Digest page */
  .digest-card {
    background: white;
    border: 1px solid var(--line);
    padding: 36px 40px;
    margin-bottom: 24px;
  }
  .digest-eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-2);
    text-transform: uppercase;
    letter-spacing: 0.10em;
    margin-bottom: 12px;
  }
  .digest-headline-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 24px;
    margin-bottom: 32px;
    padding-bottom: 32px;
    border-bottom: 1px solid var(--line);
  }
  @media (max-width: 720px) {
    .digest-headline-grid { grid-template-columns: repeat(2, 1fr); }
  }
  .digest-stat {
    border-left: 2px solid var(--accent);
    padding-left: 14px;
  }
  .digest-stat-num {
    font-family: 'Source Serif 4', Georgia, serif;
    font-size: 38px;
    font-weight: 500;
    line-height: 1;
    letter-spacing: -0.02em;
    color: var(--navy);
  }
  .digest-stat-lbl {
    font-size: 12px;
    color: var(--text-2);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-top: 6px;
    font-weight: 500;
  }
  .digest-section { margin-bottom: 32px; }
  .digest-section h3 {
    font-family: 'Source Serif 4', Georgia, serif;
    font-size: 22px;
    font-weight: 500;
    letter-spacing: -0.01em;
    color: var(--navy);
    margin-bottom: 16px;
  }
  .digest-bar-row {
    display: grid;
    grid-template-columns: 200px 1fr 50px;
    align-items: center;
    gap: 14px;
    margin-bottom: 10px;
  }
  .digest-bar-label { font-size: 13px; color: var(--text-1); }
  .digest-bar-track { height: 22px; background: var(--bg-1); overflow: hidden; }
  .digest-bar-fill { height: 100%; background: var(--digest-bar-color, var(--accent)); }
  .digest-bar-val {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text-0);
    font-weight: 500;
    text-align: right;
  }
  .digest-list { display: flex; flex-direction: column; border-top: 1px solid var(--line); }
  .digest-list-row {
    display: grid;
    grid-template-columns: 1fr auto auto;
    gap: 16px;
    align-items: baseline;
    padding: 12px 0;
    border-bottom: 1px solid var(--line);
    font-size: 14px;
  }
  .digest-list-row .agent { color: var(--navy); font-weight: 500; }
  .digest-list-row .meta { color: var(--text-2); font-size: 12.5px; font-family: 'JetBrains Mono', monospace; }
  .digest-list-row .when { color: var(--text-2); font-size: 12px; font-family: 'JetBrains Mono', monospace; }

  .digest-period-toggle { display: flex; gap: 6px; margin-bottom: 24px; }
  .digest-period-btn {
    padding: 7px 14px;
    background: white;
    border: 1px solid var(--line);
    color: var(--text-1);
    font: inherit;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .digest-period-btn.active {
    background: var(--navy);
    color: white;
    border-color: var(--navy);
  }
  .digest-period-btn:hover:not(.active) { border-color: var(--navy); color: var(--navy); }

  /* ════════════════════════════════════════════════════════════════════════
     v6.1 — Colorful deploy progress overhaul + AI chat widget
     ════════════════════════════════════════════════════════════════════════ */

  /* The progress modal needs more breathing room — bump max width */
  .modal.progress-modal { max-width: 720px; padding: 36px; }

  /* ─── Header strip with timer + ETA ─── */
  .progress-header-strip {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 24px; gap: 16px;
  }
  .progress-meta {
    display: flex; gap: 18px; align-items: baseline;
    font-size: 12px; color: var(--text-2);
    font-family: 'JetBrains Mono', monospace;
    text-transform: uppercase; letter-spacing: 0.06em;
  }
  .progress-meta-item { display: flex; gap: 6px; align-items: baseline; }
  .progress-meta-item .v {
    font-family: 'Source Serif 4', Georgia, serif;
    font-size: 18px; font-weight: 500; letter-spacing: -0.01em;
    color: var(--navy); text-transform: none;
  }
  .progress-meta-item .v.eta-ok { color: var(--good); }
  .progress-meta-item .v.eta-warn { color: var(--warn); }

  /* ─── Colorful phase pills ─── */
  .phases-v2 {
    display: grid; grid-template-columns: repeat(4, 1fr);
    gap: 10px; margin-bottom: 22px;
  }
  .phase-v2 {
    position: relative;
    padding: 14px 12px 12px;
    border-radius: 10px;
    background: var(--bg-1);
    border: 1px solid var(--line);
    display: flex; flex-direction: column; gap: 6px;
    align-items: center; text-align: center;
    overflow: hidden;
    transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .phase-v2::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(135deg, var(--phase-c1), var(--phase-c2));
    opacity: 0; transition: opacity 0.4s;
    z-index: 0;
  }
  .phase-v2 > * { position: relative; z-index: 1; }
  .phase-v2.active { border-color: transparent; transform: translateY(-2px); }
  .phase-v2.active::before { opacity: 1; }
  .phase-v2.done { border-color: transparent; }
  .phase-v2.done::before { opacity: 1; }
  .phase-v2.active .phase-v2-icon, .phase-v2.done .phase-v2-icon { color: white; }
  .phase-v2.active .phase-v2-label, .phase-v2.done .phase-v2-label { color: white; font-weight: 600; }
  .phase-v2.active .phase-v2-sub, .phase-v2.done .phase-v2-sub { color: rgba(255,255,255,0.85); }

  .phase-v2[data-phase="build"]   { --phase-c1: #f59e0b; --phase-c2: #ef4444; }
  .phase-v2[data-phase="built"]   { --phase-c1: #ef4444; --phase-c2: #ec4899; }
  .phase-v2[data-phase="deploy"]  { --phase-c1: #ec4899; --phase-c2: #8b5cf6; }
  .phase-v2[data-phase="verify"]  { --phase-c1: #8b5cf6; --phase-c2: #06b6d4; }

  .phase-v2-icon {
    width: 28px; height: 28px; border-radius: 50%;
    background: rgba(255,255,255,0.85);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 700; color: var(--text-2);
    transition: all 0.3s;
  }
  .phase-v2.active .phase-v2-icon {
    background: rgba(255,255,255,0.25);
    box-shadow: 0 0 0 0 rgba(255,255,255,0.6);
    animation: phase-pulse 1.6s infinite;
  }
  .phase-v2.done .phase-v2-icon {
    background: rgba(255,255,255,0.95); color: var(--navy);
  }
  @keyframes phase-pulse {
    0%   { box-shadow: 0 0 0 0 rgba(255,255,255,0.55); }
    70%  { box-shadow: 0 0 0 10px rgba(255,255,255,0); }
    100% { box-shadow: 0 0 0 0 rgba(255,255,255,0); }
  }
  .phase-v2-label {
    font-size: 11px; font-weight: 500;
    color: var(--text-1);
    text-transform: uppercase; letter-spacing: 0.06em;
  }
  .phase-v2-sub {
    font-size: 10px; color: var(--text-2);
    font-family: 'JetBrains Mono', monospace;
    min-height: 12px;
  }

  /* ─── Gradient progress bar with shimmer ─── */
  .progress-bar-v2-track {
    height: 6px; background: var(--bg-2); overflow: hidden;
    border-radius: 999px; margin-bottom: 22px; position: relative;
  }
  .progress-bar-v2-fill {
    height: 100%;
    background: linear-gradient(90deg, #f59e0b, #ec4899, #8b5cf6, #06b6d4, #10b981);
    background-size: 200% 100%;
    transition: width 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    position: relative;
    border-radius: 999px;
    animation: gradient-shift 3s ease infinite;
  }
  @keyframes gradient-shift {
    0%, 100% { background-position: 0% 50%; }
    50%      { background-position: 100% 50%; }
  }
  .progress-bar-v2-fill::after {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.6), transparent);
    animation: shimmer 2.2s infinite;
  }
  @keyframes shimmer {
    0%   { transform: translateX(-100%); }
    100% { transform: translateX(100%); }
  }
  .progress-bar-v2-track.is-complete .progress-bar-v2-fill {
    background: var(--good); animation: none;
  }
  .progress-bar-v2-track.is-complete .progress-bar-v2-fill::after { display: none; }

  /* ─── URL probe card (sonar pulse) ─── */
  .probe-card {
    background: linear-gradient(135deg, #1e1b4b 0%, #312e81 100%);
    color: white; border-radius: 12px;
    padding: 18px 20px; margin-bottom: 18px;
    display: grid; grid-template-columns: 56px 1fr auto;
    gap: 16px; align-items: center;
    position: relative; overflow: hidden;
  }
  .probe-card::before {
    content: ''; position: absolute; top: -40%; right: -10%;
    width: 280px; height: 280px;
    background: radial-gradient(circle, rgba(139, 92, 246, 0.30) 0%, transparent 65%);
    pointer-events: none;
  }
  .probe-card.is-ok {
    background: linear-gradient(135deg, #064e3b 0%, #047857 100%);
  }
  .probe-card.is-timeout {
    background: linear-gradient(135deg, #4a2510 0%, #92400e 100%);
  }

  .probe-radar {
    width: 56px; height: 56px; position: relative;
    display: flex; align-items: center; justify-content: center;
  }
  .probe-radar-dot {
    width: 12px; height: 12px; border-radius: 50%;
    background: #06b6d4; position: relative; z-index: 2;
    box-shadow: 0 0 12px rgba(6, 182, 212, 0.8);
  }
  .probe-card.is-ok .probe-radar-dot { background: #10b981; box-shadow: 0 0 16px rgba(16, 185, 129, 0.9); }
  .probe-card.is-timeout .probe-radar-dot { background: #fbbf24; box-shadow: 0 0 12px rgba(251, 191, 36, 0.8); }

  .probe-radar::before, .probe-radar::after {
    content: ''; position: absolute; inset: 0;
    border-radius: 50%; border: 2px solid #06b6d4;
    animation: radar-ping 2s cubic-bezier(0, 0, 0.2, 1) infinite;
  }
  .probe-radar::after { animation-delay: 1s; }
  .probe-card.is-ok .probe-radar::before, .probe-card.is-ok .probe-radar::after { border-color: #10b981; animation: none; opacity: 0; }
  .probe-card.is-timeout .probe-radar::before, .probe-card.is-timeout .probe-radar::after { border-color: #fbbf24; }
  @keyframes radar-ping {
    0%   { transform: scale(0.4); opacity: 1; }
    100% { transform: scale(1.6); opacity: 0; }
  }

  .probe-info { position: relative; z-index: 1; }
  .probe-info-line1 {
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.10em;
    color: rgba(255,255,255,0.65);
    margin-bottom: 4px;
  }
  .probe-info-url {
    font-family: 'JetBrains Mono', monospace; font-size: 13px;
    color: white; word-break: break-all;
    line-height: 1.4;
  }
  .probe-info-status {
    margin-top: 6px;
    display: flex; gap: 10px; flex-wrap: wrap;
    font-size: 11px; color: rgba(255,255,255,0.75);
  }
  .probe-step {
    display: inline-flex; align-items: center; gap: 4px;
    font-family: 'JetBrains Mono', monospace;
  }
  .probe-step .ind {
    width: 7px; height: 7px; border-radius: 50%;
    background: rgba(255,255,255,0.25);
  }
  .probe-step.is-active .ind { background: #fbbf24; box-shadow: 0 0 6px #fbbf24; animation: probe-blink 1s infinite; }
  .probe-step.is-done .ind { background: #10b981; }
  @keyframes probe-blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.35; } }

  .probe-attempts {
    text-align: right; position: relative; z-index: 1;
    font-family: 'JetBrains Mono', monospace;
  }
  .probe-attempts-num {
    font-size: 28px; font-weight: 500; line-height: 1;
    font-family: 'Source Serif 4', Georgia, serif;
    color: white;
  }
  .probe-attempts-lbl {
    font-size: 10px; color: rgba(255,255,255,0.65);
    text-transform: uppercase; letter-spacing: 0.10em;
    margin-top: 4px;
  }

  /* ─── Tip carousel — one nice fact at a time during the wait ─── */
  .tip-card {
    background: var(--bg-1);
    border-left: 3px solid var(--accent);
    padding: 12px 16px; margin-bottom: 18px;
    border-radius: 0 6px 6px 0;
    display: flex; gap: 12px; align-items: flex-start;
    min-height: 56px;
  }
  .tip-icon {
    width: 24px; height: 24px; flex-shrink: 0;
    background: var(--accent-soft);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; color: var(--accent); font-weight: 700;
  }
  .tip-content {
    flex: 1; font-size: 13px; line-height: 1.5; color: var(--text-1);
  }
  .tip-content .tip-eyebrow {
    display: block; font-size: 10px;
    text-transform: uppercase; letter-spacing: 0.1em;
    color: var(--text-2); font-weight: 600; margin-bottom: 3px;
  }
  .tip-content.fade-in { animation: tip-fade 0.5s ease-out; }
  @keyframes tip-fade {
    from { opacity: 0; transform: translateY(4px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ─── Activity feed — keep but slightly nicer ─── */
  .activity-feed-v2 {
    background: #0a1628; color: rgba(255,255,255,0.85);
    padding: 14px 16px;
    height: 160px; overflow-y: auto;
    font-family: 'JetBrains Mono', monospace; font-size: 11.5px;
    line-height: 1.65; border-radius: 8px;
  }
  .activity-feed-v2 .activity-line { color: rgba(255,255,255,0.85); }
  .activity-feed-v2 .activity-line.warning { color: #fbbf24; }
  .activity-feed-v2 .activity-line.error { color: #ff7a6e; }
  .activity-feed-v2 .activity-line .log-ts { color: rgba(255,255,255,0.4); margin-right: 8px; }
  .activity-feed-v2::-webkit-scrollbar { width: 6px; }
  .activity-feed-v2::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }

  /* ─── Confetti on success ─── */
  .confetti-layer {
    position: absolute; inset: 0; pointer-events: none;
    overflow: hidden; z-index: 10;
  }
  .confetti-piece {
    position: absolute; top: -10px; width: 8px; height: 14px;
    border-radius: 1px;
    animation: confetti-fall linear forwards;
  }
  @keyframes confetti-fall {
    0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
    100% { transform: translateY(640px) rotate(720deg); opacity: 0; }
  }

  /* ─── Result card upgrade — shine on success ─── */
  .result-card.success-shine {
    background: linear-gradient(135deg, rgba(16, 185, 129, 0.10), rgba(6, 182, 212, 0.10));
    border-left: 3px solid var(--good);
    position: relative; overflow: hidden;
  }
  .result-card.success-shine::before {
    content: ''; position: absolute; top: -50%; right: -10%;
    width: 200px; height: 200px;
    background: radial-gradient(circle, rgba(16, 185, 129, 0.18) 0%, transparent 70%);
    pointer-events: none;
  }

  /* ─── AI chat: floating action button ─── */
  .chat-fab {
    position: fixed; bottom: 24px; right: 24px;
    width: 56px; height: 56px; border-radius: 50%;
    background: linear-gradient(135deg, var(--accent) 0%, #8b5cf6 100%);
    color: white; border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; font-weight: 600;
    box-shadow: 0 12px 32px rgba(34, 81, 255, 0.35);
    z-index: 90;
    transition: transform 0.2s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .chat-fab:hover { transform: translateY(-3px) scale(1.04); }
  .chat-fab.is-open { transform: rotate(45deg); }
  .chat-fab .pulse-ring {
    position: absolute; inset: 0; border-radius: 50%;
    border: 2px solid rgba(34, 81, 255, 0.5);
    animation: chat-fab-pulse 2.4s infinite;
  }
  @keyframes chat-fab-pulse {
    0%   { transform: scale(0.95); opacity: 0.7; }
    70%  { transform: scale(1.4); opacity: 0; }
    100% { transform: scale(1.4); opacity: 0; }
  }

  /* ─── AI chat: side panel ─── */
  .chat-panel {
    position: fixed; bottom: 96px; right: 24px;
    width: 380px; max-width: calc(100vw - 32px);
    height: 560px; max-height: calc(100vh - 120px);
    background: white;
    border: 1px solid var(--line);
    box-shadow: 0 24px 64px rgba(5, 28, 44, 0.20);
    border-radius: 14px;
    display: flex; flex-direction: column;
    z-index: 95;
    overflow: hidden;
    animation: chat-slide-in 0.25s cubic-bezier(0.16, 1, 0.3, 1);
  }
  @keyframes chat-slide-in {
    from { opacity: 0; transform: translateY(12px) scale(0.98); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }
  .chat-panel-header {
    background: linear-gradient(135deg, var(--navy) 0%, #1e3a8a 100%);
    color: white;
    padding: 16px 18px;
    display: flex; align-items: center; gap: 12px;
    flex-shrink: 0;
  }
  .chat-avatar {
    width: 34px; height: 34px; border-radius: 50%;
    background: linear-gradient(135deg, #8b5cf6, #06b6d4);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 700;
    flex-shrink: 0;
  }
  .chat-title-block { flex: 1; min-width: 0; }
  .chat-title {
    font-family: 'Source Serif 4', Georgia, serif;
    font-size: 16px; font-weight: 500; letter-spacing: -0.01em;
    line-height: 1.2;
  }
  .chat-status-line {
    font-size: 11px; color: rgba(255,255,255,0.65);
    display: flex; align-items: center; gap: 6px; margin-top: 2px;
  }
  .chat-status-line .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: #10b981; box-shadow: 0 0 6px #10b981;
  }
  .chat-close-btn {
    width: 28px; height: 28px;
    background: rgba(255,255,255,0.10); border: none;
    color: white; cursor: pointer; border-radius: 6px;
    font-size: 14px;
    display: flex; align-items: center; justify-content: center;
  }
  .chat-close-btn:hover { background: rgba(255,255,255,0.20); }

  .chat-body {
    flex: 1; overflow-y: auto;
    padding: 16px; display: flex; flex-direction: column; gap: 12px;
    background: var(--bg-1);
  }
  .chat-body::-webkit-scrollbar { width: 5px; }
  .chat-body::-webkit-scrollbar-thumb { background: var(--line); border-radius: 3px; }

  .chat-msg { display: flex; gap: 8px; max-width: 100%; }
  .chat-msg.user { justify-content: flex-end; }
  .chat-bubble {
    padding: 10px 14px; border-radius: 14px;
    font-size: 13.5px; line-height: 1.5;
    max-width: 85%;
    word-wrap: break-word;
    white-space: pre-wrap;
  }
  .chat-msg.assistant .chat-bubble {
    background: white; color: var(--text-0);
    border: 1px solid var(--line);
    border-bottom-left-radius: 4px;
  }
  .chat-msg.user .chat-bubble {
    background: linear-gradient(135deg, var(--accent), #6366f1);
    color: white;
    border-bottom-right-radius: 4px;
  }
  .chat-msg.error .chat-bubble {
    background: var(--bad-soft); color: var(--bad);
    border: 1px solid rgba(224, 48, 30, 0.20);
  }
  .chat-typing {
    display: inline-flex; gap: 4px; padding: 4px 0;
  }
  .chat-typing span {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--text-2); animation: typing-bounce 1.2s infinite;
  }
  .chat-typing span:nth-child(2) { animation-delay: 0.15s; }
  .chat-typing span:nth-child(3) { animation-delay: 0.30s; }
  @keyframes typing-bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30%           { transform: translateY(-4px); opacity: 1; }
  }

  .chat-suggestions {
    display: flex; flex-wrap: wrap; gap: 6px;
    padding: 10px 14px 0;
  }
  .chat-chip {
    padding: 7px 12px;
    background: white;
    border: 1px solid var(--line);
    border-radius: 999px;
    font: inherit; font-size: 12px;
    color: var(--text-1); cursor: pointer;
    transition: all 0.15s;
  }
  .chat-chip:hover {
    border-color: var(--accent); color: var(--accent);
    background: var(--accent-soft);
  }

  .chat-input-row {
    display: flex; gap: 8px; padding: 12px 14px;
    border-top: 1px solid var(--line);
    background: white; flex-shrink: 0;
  }
  .chat-input {
    flex: 1; padding: 10px 12px;
    border: 1px solid var(--line);
    border-radius: 8px; font: inherit; font-size: 13.5px;
    color: var(--text-0); background: var(--bg-1);
    resize: none; max-height: 120px;
    outline: none;
    transition: border-color 0.15s;
  }
  .chat-input:focus { border-color: var(--accent); background: white; }
  .chat-send-btn {
    padding: 0 14px;
    background: var(--navy); color: white;
    border: none; cursor: pointer;
    border-radius: 8px; font-weight: 500;
    font: inherit; font-size: 13px;
    display: flex; align-items: center; gap: 4px;
    transition: background 0.15s;
  }
  .chat-send-btn:hover:not(:disabled) { background: var(--accent); }
  .chat-send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* On small screens, take over the bottom of the screen */
  @media (max-width: 520px) {
    .chat-panel {
      right: 8px; left: 8px; bottom: 86px;
      width: auto; height: 70vh;
    }
    .chat-fab { right: 16px; bottom: 16px; }
    .modal.progress-modal { padding: 24px 20px; }
    .phases-v2 { gap: 6px; }
    .probe-card { grid-template-columns: 44px 1fr; gap: 12px; padding: 14px; }
    .probe-attempts { display: none; }
  }

  /* ════════════════════════════════════════════════════════════════════════
     v6.4 — Countdown timeline: 6 phases × predictable durations = 5 min total
     Replaces the showcase + probe + tip carousel with a single big circular
     countdown. Each phase ticks down to 0, then advances. Build → Push →
     Deploy → Startup → Verify → Live. Total wall time = 60+60+60+60+30+30s.
     ════════════════════════════════════════════════════════════════════════ */

  /* 6-step indicator: dots connected by a thin line */
  .steps-strip {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 28px; padding: 0 4px;
    position: relative;
  }
  .steps-strip::before {
    content: ''; position: absolute;
    top: 11px; left: 24px; right: 24px;
    height: 2px; background: var(--line);
    z-index: 0;
  }
  .step-cell {
    display: flex; flex-direction: column; align-items: center;
    gap: 8px; flex: 1; min-width: 0;
    position: relative; z-index: 1;
  }
  .step-dot {
    width: 22px; height: 22px; border-radius: 50%;
    background: white; border: 2px solid var(--line);
    color: var(--text-2); font-size: 10px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    flex-shrink: 0;
  }
  .step-cell.is-active .step-dot {
    background: var(--step-color, var(--accent));
    border-color: var(--step-color, var(--accent));
    color: white;
    box-shadow: 0 0 0 4px var(--step-color-soft, var(--accent-soft));
    animation: step-throb 1.6s infinite;
  }
  .step-cell.is-done .step-dot {
    background: var(--good); border-color: var(--good); color: white;
  }
  @keyframes step-throb {
    0%, 100% { box-shadow: 0 0 0 4px var(--step-color-soft, var(--accent-soft)); }
    50%      { box-shadow: 0 0 0 8px var(--step-color-soft, var(--accent-soft)); }
  }
  .step-label {
    font-size: 10.5px; color: var(--text-2);
    text-transform: uppercase; letter-spacing: 0.06em;
    font-weight: 500; text-align: center;
    line-height: 1.2;
  }
  .step-cell.is-active .step-label { color: var(--navy); font-weight: 700; }
  .step-cell.is-done .step-label { color: var(--text-1); }

  /* Big circular countdown — the centerpiece */
  .countdown-card {
    background: linear-gradient(180deg, white 0%, var(--bg-1) 100%);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 28px 24px 24px;
    margin-bottom: 22px;
    position: relative;
    overflow: hidden;
    text-align: center;
  }
  .countdown-card::before {
    content: ''; position: absolute;
    top: -40%; left: 50%; transform: translateX(-50%);
    width: 360px; height: 360px;
    background: radial-gradient(circle, var(--phase-glow, rgba(34, 81, 255, 0.10)) 0%, transparent 65%);
    pointer-events: none; z-index: 0;
    transition: background 0.6s ease;
  }
  .countdown-wrap {
    position: relative; z-index: 1;
    width: 180px; height: 180px;
    margin: 0 auto 18px;
  }
  .countdown-svg {
    width: 100%; height: 100%; transform: rotate(-90deg);
  }
  .countdown-track-circle {
    fill: none; stroke: var(--bg-2); stroke-width: 8;
  }
  .countdown-fill-circle {
    fill: none; stroke: var(--phase-color, var(--accent));
    stroke-width: 8; stroke-linecap: round;
    transition: stroke-dashoffset 1s linear, stroke 0.6s ease;
  }
  .countdown-num {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    pointer-events: none;
  }
  .countdown-num-val {
    font-family: 'Source Serif 4', Georgia, serif;
    font-size: 64px; font-weight: 500;
    line-height: 1; letter-spacing: -0.04em;
    color: var(--navy);
    transition: color 0.3s;
  }
  .countdown-num.urgent .countdown-num-val { color: var(--phase-color, var(--accent)); }
  .countdown-num-unit {
    font-size: 11px; color: var(--text-2);
    text-transform: uppercase; letter-spacing: 0.10em;
    margin-top: 4px; font-weight: 600;
  }

  .countdown-label {
    position: relative; z-index: 1;
  }
  .countdown-phase-name {
    font-family: 'Source Serif 4', Georgia, serif;
    font-size: 22px; font-weight: 500; letter-spacing: -0.01em;
    color: var(--navy); margin-bottom: 4px;
    line-height: 1.2;
  }
  .countdown-phase-msg {
    font-size: 13px; color: var(--text-1);
    line-height: 1.5;
    max-width: 480px; margin: 0 auto;
  }
  .countdown-fade-in {
    animation: countdown-fade 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  }
  @keyframes countdown-fade {
    from { opacity: 0; transform: translateY(4px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Dotted particles around the ring while active — subtle motion */
  .countdown-orbits {
    position: absolute; inset: 0;
    pointer-events: none; z-index: 0;
  }
  .countdown-orbit {
    position: absolute; top: 50%; left: 50%;
    width: 4px; height: 4px;
    border-radius: 50%;
    background: var(--phase-color, var(--accent));
    margin: -2px 0 0 -2px;
    opacity: 0.6;
    animation: orbit 8s linear infinite;
  }
  .countdown-orbit:nth-child(2) { animation-duration: 11s; animation-direction: reverse; opacity: 0.4; }
  .countdown-orbit:nth-child(3) { animation-duration: 14s; opacity: 0.5; }
  @keyframes orbit {
    from { transform: rotate(0deg) translateX(102px) rotate(0deg); }
    to   { transform: rotate(360deg) translateX(102px) rotate(-360deg); }
  }

  /* On small screens — shrink everything */
  @media (max-width: 520px) {
    .steps-strip { margin-bottom: 20px; }
    .steps-strip::before { left: 16px; right: 16px; }
    .step-label { font-size: 9px; }
    .countdown-wrap { width: 140px; height: 140px; }
    .countdown-num-val { font-size: 48px; }
    .countdown-phase-name { font-size: 18px; }
    .countdown-card { padding: 20px 16px 18px; }
  }

  /* ─── Analytics ─── */
  .analytics-grid {
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 24px;
    margin-bottom: 24px;
  }
  .chart-card {
    background: white;
    border: 1px solid var(--line);
    padding: 28px;
  }
  .chart-title {
    font-family: 'Source Serif 4', Georgia, serif;
    font-size: 19px; font-weight: 500;
    color: var(--navy); letter-spacing: -0.01em;
    margin-bottom: 24px;
    display: flex; align-items: baseline; justify-content: space-between;
    gap: 12px;
  }
  .chart-title-meta { font-family: 'Inter', sans-serif; font-size: 12px; color: var(--text-2); font-weight: 400; }
  .bar-chart { display: flex; flex-direction: column; gap: 14px; }
  .bar-row { display: flex; align-items: center; gap: 12px; }
  .bar-label { font-size: 13px; color: var(--text-1); width: 140px; flex-shrink: 0; display: flex; align-items: center; gap: 8px; }
  .bar-label .dot { width: 8px; height: 8px; border-radius: 2px; background: var(--bar-color, var(--accent)); }
  .bar-track { flex: 1; height: 28px; background: var(--bg-1); position: relative; border-radius: 0; }
  .bar-fill { height: 100%; background: var(--bar-color, var(--accent)); transition: width 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
  .bar-value { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--text-0); font-weight: 500; min-width: 64px; text-align: right; }

  .donut-wrap { display: flex; flex-direction: column; align-items: center; gap: 20px; }
  .donut-legend { display: flex; flex-direction: column; gap: 8px; width: 100%; }
  .legend-item { font-size: 13px; color: var(--text-1); display: flex; align-items: center; gap: 8px; }
  .legend-dot { width: 10px; height: 10px; border-radius: 2px; background: var(--legend-color); flex-shrink: 0; }
  .legend-spacer { flex: 1; }
  .legend-value { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--text-0); font-weight: 500; }

  .three-col { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }

  .cost-row { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
  .cost-row-meta { display: flex; justify-content: space-between; font-size: 13px; }
  .cost-row-meta .l { color: var(--text-1); }
  .cost-row-meta .v { font-family: 'JetBrains Mono', monospace; color: var(--text-0); font-weight: 500; }
  .cost-bar { height: 4px; background: var(--bg-1); }
  .cost-bar-fill { height: 100%; background: var(--cost-color, var(--accent)); }
  .cost-total { margin-top: 12px; padding-top: 16px; border-top: 1px solid var(--line); display: flex; justify-content: space-between; font-size: 14px; }
  .cost-total .l { color: var(--text-2); text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600; font-size: 11px; }
  .cost-total .v { font-family: 'Source Serif 4', Georgia, serif; font-size: 22px; font-weight: 500; color: var(--navy); }

  .speed-num { text-align: center; padding: 12px; }
  .speed-val { font-family: 'Source Serif 4', Georgia, serif; font-size: 56px; font-weight: 500; letter-spacing: -0.03em; color: var(--good); line-height: 1; }
  .speed-val .unit { font-size: 22px; color: var(--text-2); margin-left: 4px; font-weight: 400; }
  .speed-lbl { font-size: 12px; color: var(--text-2); margin-top: 6px; text-transform: uppercase; letter-spacing: 0.08em; }
  .speed-callout {
    margin-top: 16px;
    background: var(--good-soft);
    border-left: 2px solid var(--good);
    padding: 10px 12px;
    font-size: 13px;
    color: var(--navy);
    line-height: 1.5;
  }

  .success-num { text-align: center; padding: 12px 0; }
  .success-val { font-family: 'Source Serif 4', Georgia, serif; font-size: 64px; font-weight: 500; letter-spacing: -0.03em; color: var(--good); line-height: 1; }
  .success-rows { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
  .success-row { display: flex; justify-content: space-between; font-size: 13px; }
  .success-row .l { color: var(--text-1); }
  .success-row .v { font-family: 'JetBrains Mono', monospace; color: var(--text-0); }

  /* ─── Users / RBAC ─── */
  .roles-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 24px; margin-bottom: 40px; }
  .role-card {
    background: white;
    border: 1px solid var(--line);
    border-top: 3px solid var(--role-color);
    padding: 28px;
  }
  .role-title {
    font-family: 'Source Serif 4', Georgia, serif;
    font-size: 22px; font-weight: 500;
    color: var(--navy); letter-spacing: -0.01em;
    margin-bottom: 6px;
  }
  .role-meta { font-size: 13px; color: var(--text-2); margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between; }
  .role-count { font-family: 'JetBrains Mono', monospace; color: var(--text-0); font-weight: 500; }
  .perm-list { list-style: none; display: flex; flex-direction: column; gap: 10px; }
  .perm-item {
    font-size: 13px; line-height: 1.5;
    display: flex; gap: 10px;
    color: var(--text-1);
  }
  .perm-item::before {
    content: '✓';
    color: var(--good);
    font-weight: 700;
    flex-shrink: 0;
  }
  .perm-item.no { color: var(--text-2); }
  .perm-item.no::before { content: '×'; color: var(--bad); }

  /* ─── ROI ─── */
  .roi-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 1px;
    background: var(--line);
    border: 1px solid var(--line);
    margin-bottom: 56px;
  }
  .roi-card {
    background: white;
    padding: 32px 28px;
    text-align: left;
  }
  .roi-val {
    font-family: 'Source Serif 4', Georgia, serif;
    font-size: 56px; font-weight: 500; letter-spacing: -0.03em;
    color: var(--navy);
    line-height: 1;
    margin-bottom: 12px;
  }
  .roi-val.accent { color: var(--accent); }
  .roi-val.good { color: var(--good); }
  .roi-lbl {
    font-size: 14px; font-weight: 600;
    color: var(--navy);
    margin-bottom: 6px;
  }
  .roi-sub { font-size: 13px; color: var(--text-2); line-height: 1.5; }

  .roadmap-section h2 {
    font-family: 'Source Serif 4', Georgia, serif;
    font-size: 36px; font-weight: 400;
    letter-spacing: -0.02em; line-height: 1.1;
    color: var(--navy);
    margin-bottom: 12px;
  }
  .roadmap-section .lead { color: var(--text-1); font-size: 16px; max-width: 640px; margin-bottom: 32px; }
  .roadmap-list { display: flex; flex-direction: column; gap: 0; border: 1px solid var(--line); }
  .roadmap-item {
    padding: 24px;
    background: white;
    border-bottom: 1px solid var(--line);
    display: flex; gap: 24px; align-items: flex-start;
  }
  .roadmap-item:last-child { border-bottom: none; }
  .roadmap-item:hover { background: var(--bg-1); }
  .rm-badge {
    font-size: 11px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.08em;
    padding: 4px 10px;
    flex-shrink: 0;
    min-width: 60px;
    text-align: center;
  }
  .rm-badge.now { background: var(--good); color: white; }
  .rm-badge.q2 { background: var(--accent); color: white; }
  .rm-badge.q3 { background: var(--accent-2); color: white; }
  .rm-badge.q4 { background: var(--text-2); color: white; }
  .rm-content { flex: 1; }
  .rm-title { font-weight: 600; color: var(--navy); margin-bottom: 6px; font-size: 15px; }
  .rm-desc { font-size: 13px; color: var(--text-1); line-height: 1.55; }

  /* ─── Toast ─── */
  .toast {
    position: fixed; bottom: 24px; right: 24px;
    padding: 14px 18px;
    background: var(--navy); color: white;
    z-index: 200; font-size: 14px; max-width: 360px;
    box-shadow: 0 12px 32px rgba(5, 28, 44, 0.30);
    animation: slide-in 0.3s cubic-bezier(0.16, 1, 0.3, 1);
  }
  @keyframes slide-in { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
  .loading-skeleton { background: linear-gradient(90deg, var(--bg-1) 0%, var(--bg-2) 50%, var(--bg-1) 100%); background-size: 200% 100%; animation: shimmer 1.5s infinite; min-height: 24px; }
  @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
</style>
</head>
<body>
<div id="app"></div>
<script>
'use strict';

var state = {
  user: null,
  agents: [],
  regions: [],
  deployments: [],
  view: 'login',
  filter: { category: 'All', q: '' },
  metrics: null,         // overview cache
  metricsRegions: null,
  metricsCost: null,
  metricsAgents: null,
  metricsDeploy: null,
  users: null,
  roi: null,
};

var activeProgress = null;
var deployModal = null;
var filterDebounceTimer = null;
var app = document.getElementById('app');

async function api(path, opts) {
  opts = opts || {};
  // Merge our default headers with whatever the caller passed. The
  // X-Requested-With header is required by the server's CSRF defense.
  var headers = Object.assign({
    'Content-Type': 'application/json',
    'X-Requested-With': 'agentos'
  }, opts.headers || {});
  var r = await fetch(path, Object.assign({
    credentials: 'same-origin'
  }, opts, { headers: headers }));
  if (!r.ok) {
    var err = { error: 'HTTP ' + r.status };
    try { err = await r.json(); } catch (e) {}
    throw new Error(err.error || err.message || ('HTTP ' + r.status));
  }
  return r.json();
}

function escapeHtml(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, function(c) {
    return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c];
  });
}
function escapeAttr(s) { return escapeHtml(s); }
function formatMoney(n) { return '$' + (Math.round(n * 100) / 100).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
function formatNumber(n) { return Number(n).toLocaleString('en-US'); }
function relativeTime(iso) {
  if (!iso) return '—';
  var s = (Date.now() - new Date(iso).getTime()) / 1000;
  if (s < 60) return Math.round(s) + 's ago';
  if (s < 3600) return Math.round(s/60) + 'm ago';
  if (s < 86400) return Math.round(s/3600) + 'h ago';
  return Math.round(s/86400) + 'd ago';
}
function showToast(msg) {
  var t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(function() { t.remove(); }, 4000);
}

function render() {
  if (!state.user) { renderLogin(); return; }
  if (state.view === 'dashboard') return renderDashboard();
  if (state.view === 'analytics') return renderAnalytics();
  if (state.view === 'users') return renderUsers();
  if (state.view === 'roi') return renderRoi();
  if (state.view === 'digest') return renderDigest();
  renderMarketplace();
}

// Mount the chat FAB once after every render so navigation never loses it
var _origRender = render;
render = function() {
  _origRender();
  if (state.user) ensureChatFab();
  else removeChatUi();
};

function renderLogin() {
  app.innerHTML = ''
    + '<div class="login-page">'
    +   '<div class="splash">'
    +     '<div class="splash-mark">A</div>'
    +     '<div>'
    +       '<h1 class="splash-headline">Enterprise AI agents,<br><em>deployable.</em></h1>'
    +       '<p class="splash-sub">A multi-region platform for shipping AI agents to production. '
    +       'Tenant-isolated, region-resident, governed by enterprise IAM and CI/CD.</p>'
    +     '</div>'
    +     '<div class="splash-foot">AgentOS · v6.0 · Multi-region</div>'
    +   '</div>'
    +   '<div class="login-card">'
    +     '<div class="login-card-inner">'
    +       '<h2>Sign in</h2>'
    +       '<p class="desc">Use the demo credentials below or your enterprise SSO.</p>'
    +       '<form id="login-form">'
    +         '<div class="form-row">'
    +           '<label for="email">Email</label>'
    +           '<input type="email" id="email" value="admin@demo.com" required>'
    +         '</div>'
    +         '<div class="form-row">'
    +           '<label for="password">Password</label>'
    +           '<input type="password" id="password" value="demo123" required>'
    +         '</div>'
    +         '<button type="submit" class="btn btn-primary">Sign in</button>'
    +         '<button type="button" class="btn azure-btn">Continue with Microsoft Azure AD</button>'
    +         '<div id="login-error"></div>'
    +       '</form>'
    +       '<div class="demo-hint">'
    +         '<strong>Demo:</strong> <code>admin@demo.com</code> / <code>demo123</code><br>'
    +         '<span style="color: var(--text-2);">Read-only: <code>viewer@demo.com</code></span>'
    +       '</div>'
    +     '</div>'
    +   '</div>'
    + '</div>';

  document.getElementById('login-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    var errBox = document.getElementById('login-error');
    errBox.innerHTML = '';
    try {
      var res = await api('/api/auth/login', {
        method: 'POST',
        body: JSON.stringify({
          email: document.getElementById('email').value,
          password: document.getElementById('password').value
        })
      });
      state.user = res.user;
      await loadCatalog();
      state.view = 'marketplace';
      render();
    } catch (err) {
      errBox.innerHTML = '<div class="login-error">' + escapeHtml(err.message) + '</div>';
    }
  });
}

async function loadCatalog() {
  var cat = await api('/api/agents');
  var dep = await api('/api/deployments');
  state.agents = cat.agents;
  state.regions = cat.regions;
  state.deployments = dep.deployments;
}

function topbarHtml() {
  var nameSrc = state.user.name || state.user.email;
  var initials = nameSrc.split(' ').map(function(s){return s[0];}).join('').slice(0,2).toUpperCase();
  var regionsLabel = state.regions.map(function(r){return r.flag + ' ' + r.shortName;}).join(' · ');
  function navBtn(view, label, badge) {
    return '<button class="nav-item ' + (state.view===view?'active':'') + '" data-view="' + view + '">'
      + label
      + (badge ? '<span class="nav-badge">' + badge + '</span>' : '')
      + '</button>';
  }
  return ''
    + '<div class="topbar">'
    +   '<div class="topbar-mark">A</div>'
    +   '<div class="topbar-name">AgentOS<span>v6 · Multi-region</span></div>'
    +   '<div class="nav">'
    +     navBtn('marketplace', 'Catalog')
    +     navBtn('dashboard', 'Deployments', state.deployments.length || null)
    +     navBtn('analytics', 'Analytics')
    +     navBtn('users', 'Users')
    +     navBtn('roi', 'Business case')
    +     (state.user.role === 'admin' ? navBtn('digest', 'Digest') : '')
    +   '</div>'
    +   '<div class="topbar-right">'
    +     '<button class="sound-toggle ' + (isCompletionSoundOff() ? 'is-off' : '') + '" id="sound-toggle" title="Audio when deploys finish">'
    +       (isCompletionSoundOff() ? '🔇' : '🔊') + ' <span style="font-size:10px">Sound</span>'
    +     '</button>'
    +     '<div class="topbar-region">' + regionsLabel + '</div>'
    +     '<div class="topbar-user"><div class="avatar">' + initials + '</div><span class="user-name">' + escapeHtml(state.user.name) + '</span></div>'
    +     '<span class="signout-link" id="signout">Sign out</span>'
    +   '</div>'
    + '</div>';
}

function isCompletionSoundOff() {
  try { return localStorage.getItem('agentos-completion-sound') === 'off'; } catch (e) { return false; }
}

function wireTopbar() {
  document.getElementById('signout').addEventListener('click', signOut);
  var soundBtn = document.getElementById('sound-toggle');
  if (soundBtn) {
    soundBtn.addEventListener('click', function() {
      var off = isCompletionSoundOff();
      try { localStorage.setItem('agentos-completion-sound', off ? 'on' : 'off'); } catch (e) {}
      soundBtn.classList.toggle('is-off', !off);
      soundBtn.innerHTML = (!off ? '🔇' : '🔊') + ' <span style="font-size:10px">Sound</span>';
      showToast(!off ? 'Completion sound off' : 'Completion sound on');
    });
  }
  document.querySelectorAll('.nav-item').forEach(function(b) {
    b.addEventListener('click', function() { state.view = b.dataset.view; render(); });
  });
}

// ─── Marketplace ──────────────────────────────────────────────────────────────
function renderMarketplace() {
  var cats = ['All'].concat(Array.from(new Set(state.agents.map(function(a){return a.category;}))));
  var q = state.filter.q.toLowerCase();
  var filtered = state.agents.filter(function(a) {
    if (state.filter.category !== 'All' && a.category !== state.filter.category) return false;
    if (q && !((a.name + ' ' + a.description + ' ' + (a.tags||[]).join(' ')).toLowerCase().includes(q))) return false;
    return true;
  });

  app.innerHTML = ''
    + topbarHtml()
    + '<div class="page-wrapper">'
    +   '<div class="page-eyebrow">Catalog</div>'
    +   '<h1 class="page-title">Twenty-five enterprise agents.<br><em>One click to deploy.</em></h1>'
    +   '<p class="page-sub">Pick an agent, pick a cloud, pick a region, click deploy. The platform handles provisioning, secrets, networking, and compliance — region-resident, tenant-isolated, governed by your IAM. Now deploys to <strong>Azure</strong> (UAE North · UK South) and <strong>AWS</strong> (UAE Central · Bahrain).</p>'
    +   voiceTourHtml()
    +   '<div class="page-divider"></div>'
    +   '<div class="filters">'
    +     '<input type="text" class="search-box" id="search" placeholder="Search agents…" value="' + escapeAttr(state.filter.q) + '">'
    +     '<div class="pills">'
    +       cats.map(function(c) {
            return '<button class="pill ' + (c===state.filter.category?'active':'') + '" data-cat="' + escapeAttr(c) + '">' + escapeHtml(c) + '</button>';
          }).join('')
    +     '</div>'
    +   '</div>'
    +   '<div class="grid">'
    +     filtered.map(agentCardHtml).join('')
    +   '</div>'
    + '</div>';

  wireTopbar();
  wireVoiceTour();
  document.querySelectorAll('.pill').forEach(function(p) {
    p.addEventListener('click', function() { state.filter.category = p.dataset.cat; render(); });
  });
  document.getElementById('search').addEventListener('input', function(e) {
    state.filter.q = e.target.value;
    clearTimeout(filterDebounceTimer);
    filterDebounceTimer = setTimeout(render, 200);
  });
  document.querySelectorAll('.deploy-btn').forEach(function(b) {
    b.addEventListener('click', function() {
      var a = state.agents.find(function(x){return x.id === b.dataset.agent;});
      openDeployModal(a);
    });
  });
}

// ─── Voice tour (ElevenLabs) ──────────────────────────────────────────────────
// Renders a 30-second voice walkthrough strip at the top of the marketplace.
// First request per language hits the /api/voiceover endpoint and may take 3-5s
// while ElevenLabs generates; subsequent requests serve from the server-side
// cache instantly.

var voiceTourLanguages = [
  // Default set — server returns the authoritative list at /api/voiceover/languages
  { code: 'en', name: 'English',  native: 'English' },
  { code: 'ar', name: 'Arabic',   native: 'العربية' },
  { code: 'hi', name: 'Hindi',    native: 'हिन्दी' },
  { code: 'fr', name: 'French',   native: 'Français' },
  { code: 'es', name: 'Spanish',  native: 'Español' },
];
var voiceTourSelectedLang = localStorage.getItem('voice-tour-lang') || 'en';

function voiceTourHtml() {
  var opts = voiceTourLanguages.map(function(l) {
    var sel = l.code === voiceTourSelectedLang ? ' selected' : '';
    return '<option value="' + l.code + '"' + sel + '>' + escapeHtml(l.native) + '</option>';
  }).join('');
  return ''
    + '<div class="voice-tour" id="voice-tour">'
    +   '<div class="voice-tour-icon">🎧</div>'
    +   '<div class="voice-tour-text">'
    +     '<div class="voice-tour-eyebrow">30-second voice tour</div>'
    +     '<div class="voice-tour-title">Hear how AgentOS deploys your agent</div>'
    +   '</div>'
    +   '<div class="voice-tour-controls">'
    +     '<select class="voice-lang-select" id="voice-lang">' + opts + '</select>'
    +     '<button class="voice-play-btn" id="voice-play-btn">▶ Listen</button>'
    +   '</div>'
    +   '<div id="voice-audio-slot"></div>'
    + '</div>';
}

function wireVoiceTour() {
  // Refresh languages from server (in case more were added since last render)
  api('/api/voiceover/languages').then(function(r) {
    if (r && Array.isArray(r.languages) && r.languages.length) {
      voiceTourLanguages = r.languages;
      var select = document.getElementById('voice-lang');
      if (select) {
        select.innerHTML = voiceTourLanguages.map(function(l) {
          var sel = l.code === voiceTourSelectedLang ? ' selected' : '';
          return '<option value="' + l.code + '"' + sel + '>' + escapeHtml(l.native) + '</option>';
        }).join('');
      }
    }
  }).catch(function(){});

  var langSelect = document.getElementById('voice-lang');
  var playBtn = document.getElementById('voice-play-btn');
  var slot = document.getElementById('voice-audio-slot');
  if (!langSelect || !playBtn) return;

  langSelect.addEventListener('change', function() {
    voiceTourSelectedLang = langSelect.value;
    try { localStorage.setItem('voice-tour-lang', voiceTourSelectedLang); } catch (e) {}
    // Clear any previously loaded audio so the next play uses the new language
    slot.innerHTML = '';
    playBtn.innerHTML = '▶ Listen';
  });

  playBtn.addEventListener('click', async function() {
    var lang = langSelect.value;
    playBtn.disabled = true;
    playBtn.innerHTML = 'Generating <span class="dots"><span></span><span></span><span></span></span>';
    slot.innerHTML = '';

    try {
      // Fetch the audio. First call per language may take 3-5s while ElevenLabs
      // generates; subsequent calls are instant from the server-side cache.
      var resp = await fetch('/api/voiceover/' + encodeURIComponent(lang), {
        credentials: 'same-origin',
      });
      if (!resp.ok) {
        var err;
        try { err = await resp.json(); } catch (e) { err = { error: 'HTTP ' + resp.status }; }
        throw new Error(err.error || ('HTTP ' + resp.status));
      }
      var blob = await resp.blob();
      var url = URL.createObjectURL(blob);

      slot.innerHTML = ''
        + '<div class="voice-audio-wrap">'
        +   '<audio controls autoplay src="' + url + '"></audio>'
        + '</div>';
      playBtn.innerHTML = '↻ Play again';
      playBtn.disabled = false;
    } catch (err) {
      slot.innerHTML = ''
        + '<div class="voice-tour-error">'
        +   '<strong>Voice tour unavailable.</strong> ' + escapeHtml(err.message)
        + '</div>';
      playBtn.innerHTML = '▶ Listen';
      playBtn.disabled = false;
    }
  });
}

function agentCardHtml(a, i) {
  var canDeploy = a.live && a.cicdProvider !== null;
  var showcaseDisabled = !a.showcaseUrl;
  return ''
    + '<div class="card" style="--card-color: ' + a.color + '; --i: ' + i + ';">'
    +   '<div class="card-icon">' + a.icon + '</div>'
    +   '<div class="card-header">'
    +     '<div class="card-badge">' + escapeHtml(a.badge) + '</div>'
    +     '<div class="card-status ' + (a.live?'':'coming-soon') + '">'
    +       '<span class="dot"></span>' + (a.live?'Live':'Soon')
    +     '</div>'
    +   '</div>'
    +   '<h3>' + escapeHtml(a.name) + '</h3>'
    +   '<div class="card-desc">' + escapeHtml(a.description) + '</div>'
    +   '<div class="card-tags">'
    +     (a.tags||[]).slice(0,3).map(function(t){return '<span class="card-tag">'+escapeHtml(t)+'</span>';}).join('')
    +   '</div>'
    +   '<div class="card-actions">'
    +     '<a class="card-cta ' + (showcaseDisabled?'disabled':'') + '" href="' + (a.showcaseUrl||'#') + '" target="_blank" rel="noopener">Open ↗</a>'
    +     '<button class="card-cta primary deploy-btn ' + (canDeploy?'':'disabled') + '" data-agent="' + a.id + '" ' + (canDeploy?'':'disabled') + '>'
    +       (canDeploy?'Deploy':'Coming soon')
    +     '</button>'
    +   '</div>'
    + '</div>';
}

// ─── Deploy modal ─────────────────────────────────────────────────────────────
function openDeployModal(agent) {
  closeDeployModal();
  deployModal = { agent: agent, step: 'cloud', selectedCloud: null, selectedRegion: null };
  var wrap = document.createElement('div');
  wrap.className = 'modal-bg';
  wrap.id = 'deploy-modal-bg';
  document.body.appendChild(wrap);
  renderDeployModal();
  wrap.addEventListener('click', function(e) {
    if (e.target.id === 'deploy-modal-bg') closeDeployModal();
  });
}

function closeDeployModal() {
  deployModal = null;
  var el = document.getElementById('deploy-modal-bg');
  if (el) el.remove();
}

function renderDeployModal() {
  if (!deployModal) return;
  var m = deployModal;
  var wrap = document.getElementById('deploy-modal-bg');
